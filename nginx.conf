# ElevateIQ — High Performance Nginx Server Configuration

server {
    listen 80;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com elevateiq.in www.elevateiq.in 200.97.171.124;

    # Enable Gzip Compression for maximum text & JSON response speed
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ElevateIQ Main Portal Frontend
    location / {
        root /var/www/elevateiq/frontend;
        index index.html;
        try_files $uri $uri/ =404;

        # Static Assets Browser Caching
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # EduTech Sub-Portal Static Files
    location /edutech/ {
        alias /var/www/elevateiq/edutech/;
        index index.html;

        # Static Assets Browser Caching
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Reverse Proxy API Endpoints to Gunicorn WSGI Backend
    location ~ ^/(api|login|register|forgot-password|reset-password|announcements|employees|profile|attendance|leaves|jobs|applications|dashboard|reports|chat|designations|auth|crm|recruitment|payroll|tickets) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time SSE streams
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
