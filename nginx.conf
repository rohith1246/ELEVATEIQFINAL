# ElevateIQ — High Performance SSL Nginx Server Configuration

# 1. HTTP Server (Port 80) — Automatic 301 Redirect to Secure HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com elevateiq.in www.elevateiq.in 200.97.171.124;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server (Port 443) — Secure SSL Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com elevateiq.in www.elevateiq.in 200.97.171.124;

    # Let's Encrypt SSL Certificates
    ssl_certificate /etc/letsencrypt/live/elevateiq-softtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elevateiq-softtech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enable Gzip Compression for maximum text & JSON response speed
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # ElevateIQ Main Portal Frontend
    location / {
        root /var/www/elevateiq/frontend;
        index index.html;
        try_files $uri $uri/ @backend;

        # HTML Pages: NEVER cache so website updates take effect immediately on all devices
        location ~* \.(html|htm)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            try_files $uri $uri/ =404;
        }

        # JavaScript & CSS Files: Always revalidate with server for instant code updates
        location ~* \.(css|js)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri $uri/ =404;
        }

        # Images & Fonts: 7-day browser caching
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
            try_files $uri $uri/ =404;
        }
    }

    # EduTech Sub-Portal Static Files
    location /edutech/ {
        alias /var/www/elevateiq/edutech/;
        index index.html;
        try_files $uri $uri/ @backend;

        # HTML Pages: NEVER cache for instant updates
        location ~* \.(html|htm)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # JavaScript & CSS Files: Always revalidate
        location ~* \.(css|js)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Images & Fonts: 7-day browser caching
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Named Location Backend Proxy — Forwards all API & dynamic requests directly to Flask/Gunicorn
    location @backend {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for real-time SSE streams & fast API delivery
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }
}
