# ElevateIQ — High Performance SSL Nginx Server Configuration

# 1. HTTP Server (Port 80) — Automatic 301 Redirect to Secure HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com elevateiq.in www.elevateiq.in 200.97.171.124;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server (Port 443) — Secure SSL Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com elevateiq.in www.elevateiq.in 200.97.171.124;

    # Let's Encrypt SSL Certificates
    ssl_certificate /etc/letsencrypt/live/elevateiq-softtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elevateiq-softtech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Enable Gzip Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── SSE Stream — special route, no buffering, no timeout ──────────────────
    location /chat/stream {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── All Backend API Routes → Gunicorn ────────────────────────────────────
    location ~ ^/(api|login|register|logout|forgot-password|reset-password|announcements|employees|profile|attendance|leaves|jobs|applications|dashboard|reports|chat|designations|auth|crm|recruitment|payroll|tickets) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # ── EduTech Sub-Portal ────────────────────────────────────────────────────
    location /edutech/ {
        alias /var/www/elevateiq/edutech/;
        index index.html;

        location ~* \.(html|htm)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
        location ~* \.(css|js)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|mp4)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # ── Main Frontend Static Files ────────────────────────────────────────────
    location / {
        root /var/www/elevateiq/frontend;
        index index.html;
        try_files $uri $uri/ =404;

        location ~* \.(html|htm)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
        location ~* \.(css|js)$ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|mp4)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }
}

# 3. HTTP Server (Port 80) — Assessment Subdomain
server {
    listen 80;
    listen [::]:80;
    server_name assessment.elevateiq-softtech.com assessment.elevateiq.in;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

