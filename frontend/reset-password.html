<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — ElevateIQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="shortcut icon" href="images/logo.png" type="image/png">
<link rel="stylesheet" href="style.css">
<style>
  .password-wrapper { position: relative; width: 100%; }
  .password-wrapper input { padding-right: 46px !important; }
  .password-toggle {
    position: absolute; top: 50%; right: 14px; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #3ea6ff;
    display: flex; align-items: center; justify-content: center; padding: 4px; z-index: 10;
  }
</style>
</head>
<body>

<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="/edutech/" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
  </div>
</nav>

<section class="auth-wrap">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="sub">Set a new secure password for your ElevateIQ account</p>

    <form id="resetForm">
      <div class="field">
        <label for="password">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required placeholder="Min 8 characters, 1 digit, 1 special">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>
      
      <div class="field">
        <label for="confirm_password">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" required placeholder="Re-enter password">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm_password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary auth-submit" style="width: 100%;">Update Password</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">Back to <a href="login.html">Log in</a></div>
  </div>
</section>

<footer>
  © 2026 ElevateIQ Soft Tech Private Limited. All rights reserved.
</footer>

<script>
const API_BASE = window.location.origin.startsWith('file:') ? "http://localhost:5000" : window.location.origin;
const token = new URLSearchParams(window.location.search).get("token");

if (!token) {
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('errorMsg').textContent = 'Error: Invalid or missing reset token. Please check your email link.';
  document.getElementById('errorMsg').style.display = 'block';
}

document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm_password').value;

  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match.';
    errorMsg.style.display = 'block';
    return;
  }

  const submitBtn = document.querySelector('.auth-submit');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.innerHTML = 'Updating...';

  try {
    const res = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message || 'Password updated successfully! Redirecting...';
      successMsg.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } else {
      errorMsg.textContent = data.error || 'Failed to reset password.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach server. Verify connection.';
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});

function togglePasswordVisibility(fieldId, btn) {
  const pwdInput = document.getElementById(fieldId);
  if (pwdInput.type === 'password') {
    pwdInput.type = 'text';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
  } else {
    pwdInput.type = 'password';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
  }
}
</script>
</body>
</html>
