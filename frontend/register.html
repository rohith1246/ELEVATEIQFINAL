<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Elevate IQ</title>
<link rel="shortcut icon" href="images/logo.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>


<!-- ==================== BACKGROUND VISUALS ==================== -->
<!-- Ambient Background Video -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<!-- Dynamic backdrop gradient orbs -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>


<!-- ==================== NAVIGATION BAR ==================== -->
<nav>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
    <div class="menu-toggle" id="mobile-menu-btn" onclick="this.classList.toggle('active'); document.getElementById('navLinks').classList.toggle('active')">
    <span></span>
    <span></span>
    <span></span>
  </div>
<ul id="navLinks" class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="openings.html">Careers</a></li>
    <li><a href="index.html#services">Services</a></li>
    <li><a href="edutech/index.html">EduTech</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
    <a href="register.html" class="btn-primary">Sign up</a>
  </div>
</nav>


<!-- ==================== REGISTER FORM CARD ==================== -->
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="sub">Apply faster and track your applications</p>

    <form id="registerForm">
      <div class="field"><label for="name">Full name</label><input type="text" id="name" required></div>
      <div class="field"><label for="email">Email address</label><input type="email" id="email" required></div>
      <div class="field"><label for="password">Password</label><input type="password" id="password" minlength="6" required></div>
      
      <!-- Terms & Conditions Checkbox -->
      <div style="display: flex; align-items: flex-start; gap: 8px; margin-bottom: 20px; font-size: 13px; color: var(--ink-soft); text-align: left;">
        <input type="checkbox" id="terms" required style="margin-top: 3px; cursor: pointer;">
        <label for="terms" style="cursor: pointer; line-height: 1.4; font-weight: normal; color: inherit; text-transform: none;">I agree to the Terms & Conditions and Privacy Policy</label>
      </div>

      <button type="submit" class="btn-primary auth-submit">Create Account</button>
    </form>

    <!-- Error/Success status message display elements -->
    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">Already have an account? <a href="login.html">Login</a></div>
  </div>
</section>


<!-- ==================== FOOTER ==================== -->
<footer>
  © 2026 ElevateIQ Soft Tech Private Limited. All rights reserved.
</footer>


<!-- ==================== SCRIPTS ==================== -->
<script>
// Determine backend API URL depending on current context (localhost vs production origin)
const API_BASE = window.location.origin.startsWith('file:') ? "http://localhost:5000" : window.location.origin;

// Handle candidate registration form submission and integration
document.getElementById('registerForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const payload = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    role: "candidate"
  };

  try {
    // Send register request to back-end API
    const res = await fetch(`${API_BASE}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message || 'Account created successfully.';
      successMsg.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    } else {
      errorMsg.textContent = data.error || 'Something went wrong.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Make sure the backend is running.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
