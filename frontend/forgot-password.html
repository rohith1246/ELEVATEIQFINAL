<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — ElevateIQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="shortcut icon" href="images/logo.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="/edutech/" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
  </div>
</nav>

<section class="auth-wrap">
  <div class="auth-card">
    <h1>Forgot Password</h1>
    <p class="sub">Enter your email and we'll send you a password reset link</p>

    <form id="forgotForm">
      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="e.g. name@company.com">
      </div>
      <button type="submit" class="btn-primary auth-submit" style="width: 100%;">Send Reset Link</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">Remember your password? <a href="login.html">Log in</a></div>
  </div>
</section>

<footer>
  © 2026 ElevateIQ Soft Tech Private Limited. All rights reserved.
</footer>

<script>
const API_BASE = window.location.origin.startsWith('file:') ? "http://localhost:5000" : window.location.origin;

document.getElementById('forgotForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const submitBtn = document.querySelector('.auth-submit');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.innerHTML = 'Sending...';

  try {
    const res = await fetch(`${API_BASE}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        portal: "elevateiq"
      })
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message;
      successMsg.style.display = 'block';
    } else {
      errorMsg.textContent = data.error || 'Failed to send reset link.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach server. Verify connection.';
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});
</script>
</body>
</html>
