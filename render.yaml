databases:
  - name: elevateiq-db
    plan: free
    databaseName: elevateiq
    user: elevateiq_user

services:
  - type: web
    name: elevateiq-web
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python init_db.py
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elevateiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
