<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Elevate IQ</title>
<link rel="stylesheet" href="style.css">
<style>
/* Dashboard Specific Styles */
.dash-container {
    display: flex;
    min-height: 100vh;
    padding-top: 80px;
    position: relative;
    z-index: 2;
}
.sidebar {
    width: 260px;
    background: rgba(8, 22, 38, 0.6);
    border-right: 1px solid var(--glass-border);
    backdrop-filter: blur(25px);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: fixed;
    height: calc(100vh - 80px);
    overflow-y: auto;
}
.sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-radius: 12px;
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
    cursor: pointer;
}
.sidebar-link:hover, .sidebar-link.active {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
    border-left: 3px solid var(--orange);
    padding-left: 15px;
}
.dash-content {
    margin-left: 260px;
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 22px;
    margin-bottom: 40px;
}
.stat-card {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(15px);
}
.stat-card h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--ink-faint);
    letter-spacing: 1px;
}
.stat-card .val {
    font-size: 32px;
    font-weight: 700;
    margin-top: 10px;
}
.stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(255, 140, 50, 0.15) 0%, transparent 70%);
    border-radius: 50%;
}
.section-panel {
    display: none;
}
.section-panel.active {
    display: block;
    animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}
/* Table design */
.table-wrap {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow-x: auto;
    margin-top: 20px;
    backdrop-filter: blur(10px);
}
table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 14px;
}
th {
    background: rgba(255, 255, 255, 0.06);
    color: var(--ink);
    font-weight: 600;
    padding: 16px 20px;
    border-bottom: 1px solid var(--glass-border);
}
td {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    color: var(--ink-soft);
}
tr:hover td {
    background: rgba(255, 255, 255, 0.02);
    color: #fff;
}
.badge {
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}
.badge.pending { background: rgba(255, 140, 50, 0.15); color: #ffbc85; border: 1px solid rgba(255, 140, 50, 0.3); }
.badge.approved { background: rgba(62, 166, 255, 0.15); color: #8ad2ff; border: 1px solid rgba(62, 166, 255, 0.3); }
.badge.rejected { background: rgba(255, 75, 75, 0.15); color: #ff9999; border: 1px solid rgba(255, 75, 75, 0.3); }
.badge.active { background: rgba(75, 255, 120, 0.15); color: #99ffaa; border: 1px solid rgba(75, 255, 120, 0.3); }
.badge.inactive { background: rgba(255, 255, 255, 0.1); color: var(--ink-faint); }
.badge.shortlisted { background: rgba(230, 230, 75, 0.15); color: #ffffaa; border: 1px solid rgba(230, 230, 75, 0.3); }

/* Forms input custom style */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
}
@media(max-width:760px) {
    .dash-container { flex-direction: column; }
    .sidebar { width: 100%; position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--glass-border); }
    .dash-content { margin-left: 0; padding: 20px; }
    .form-grid { grid-template-columns: 1fr; }
}
.btn-action {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: 0.2s;
    text-decoration: none;
    display: inline-block;
}
.btn-approve { background: rgba(62, 166, 255, 0.2); color: #8ad2ff; border: 1px solid rgba(62, 166, 255, 0.4); }
.btn-approve:hover { background: rgba(62, 166, 255, 0.4); }
.btn-reject { background: rgba(255, 75, 75, 0.2); color: #ff9999; border: 1px solid rgba(255, 75, 75, 0.4); margin-left: 6px; }
.btn-reject:hover { background: rgba(255, 75, 75, 0.4); }
.btn-edit { background: rgba(255, 255, 255, 0.08); color: var(--ink-soft); border: 1px solid var(--glass-border); }
.btn-edit:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }

.modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(4, 11, 23, 0.85);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.modal.open {
    display: flex;
}
.modal-content {
    background: rgba(8, 22, 38, 0.95);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    max-width: 600px;
    width: 100%;
    padding: 36px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    position: relative;
}
.close-modal {
    position: absolute;
    top: 20px; right: 20px;
    background: none; border: none; color: var(--ink-faint);
    font-size: 24px; cursor: pointer;
}
.close-modal:hover { color: #fff; }

/* Chat Container Styles */
.chat-container {
    display: flex;
    height: 72vh;
    background: rgba(14, 20, 38, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(24px);
}
.chat-sidebar {
    width: 320px;
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    background: rgba(6, 14, 34, 0.3);
}
.chat-sidebar-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.chat-list-item {
    padding: 16px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    background: rgba(255, 255, 255, 0.02);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.chat-list-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.08);
}
.chat-list-item.active {
    background: var(--orange) !important;
    border-color: var(--orange) !important;
    box-shadow: 0 4px 15px rgba(255, 138, 61, 0.25);
}
.chat-list-item .title {
    font-weight: 600;
    font-size: 14.5px;
    color: #fff;
    margin-bottom: 4px;
}
.chat-list-item .subtitle {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
}
.chat-list-item.active .subtitle {
    color: rgba(255, 255, 255, 0.85);
}
.badge {
    background: var(--orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
}
.chat-list-item.active .badge {
    background: #fff;
    color: var(--orange);
}
.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(6, 14, 34, 0.15);
}
.chat-main-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(6, 14, 34, 0.2);
}
.chat-messages {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.msg-bubble {
    max-width: 65%;
    padding: 12px 18px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
}
.msg-bubble.incoming {
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}
.msg-bubble.outgoing {
    background: var(--orange);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 12px rgba(255, 138, 61, 0.2);
}
.msg-bubble .sender {
    font-size: 11px;
    color: var(--blue);
    margin-bottom: 4px;
    font-weight: 600;
}
.msg-bubble .time {
    font-size: 10px;
    color: var(--ink-faint);
    margin-top: 6px;
    text-align: right;
}
.msg-bubble.outgoing .time {
    color: rgba(255, 255, 255, 0.65);
}
.chat-input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--glass-border);
    display: flex;
    gap: 12px;
    background: rgba(6, 14, 34, 0.2);
}
.chat-input {
    flex: 1;
    background: #0f1c2e;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    padding: 14px 18px;
    color: #fff;
    font-family: inherit;
    outline: none;
    font-size: 14px;
}
.chat-input:focus {
    border-color: var(--orange);
}
.chat-input-area .btn-primary {
    background: var(--orange) !important;
    border-color: var(--orange) !important;
    color: #fff !important;
    border-radius: 10px;
    padding: 12px 24px;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s ease;
}
.chat-input-area .btn-primary:hover {
    background: var(--orange-dark) !important;
    box-shadow: 0 4px 12px rgba(255, 138, 61, 0.3);
}
.group-members-pane {
    width: 250px;
    border-left: 1px solid var(--glass-border);
    background: rgba(6, 14, 34, 0.25);
    display: flex;
    flex-direction: column;
}
.member-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    padding: 10px 14px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.member-card .name {
    font-weight: 600;
    font-size: 13px;
    color: #fff;
}
.member-card .status {
    font-size: 10.5px;
    color: #00e676; /* vibrant green */
    display: flex;
    align-items: center;
    gap: 4px;
}

/* Modals Override styling */
.modal-content {
    background: #0d1928 !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 20px !important;
    padding: 32px !important;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6) !important;
}
.modal-content h2 {
    font-size: 22px !important;
    font-weight: 700 !important;
    color: #fff !important;
    margin-bottom: 24px !important;
}
.modal-content input[type="text"], 
.modal-content input[type="password"], 
.modal-content input[type="email"] {
    width: 100%;
    background: #182739 !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    border-radius: 10px !important;
    padding: 14px 18px !important;
    color: #fff !important;
    font-size: 14px !important;
    outline: none !important;
    margin-bottom: 20px !important;
}
.modal-content input:focus {
    border-color: var(--orange) !important;
}
.modal-content .btn-primary {
    background: var(--orange) !important;
    border-color: var(--orange) !important;
    color: #fff !important;
    font-weight: 700 !important;
    font-size: 15px !important;
    border-radius: 10px !important;
    padding: 14px 20px !important;
    width: 100% !important;
    transition: all 0.2s ease !important;
}
.modal-content .btn-primary:hover {
    background: var(--orange-dark) !important;
    box-shadow: 0 4px 15px rgba(255, 138, 61, 0.3) !important;
}
</style>
</head>
<body>

<!-- Ambient Background Video -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <div class="nav-right">
    <span id="userGreeting" style="font-size:14px; color:var(--ink-soft); margin-right:15px;"></span>
    <button onclick="logout()" class="btn-ghost" style="padding: 8px 20px; font-size:13px;">Log out</button>
  </div>
</nav>

<div class="dash-container">
    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebarMenu">
        <!-- Rendered Dynamically based on role -->
    </div>

    <!-- Main Content Area -->
    <div class="dash-content">
        <h1 id="dashTitle" style="font-size:28px; margin-bottom:6px;">Dashboard</h1>
        <p id="dashSub" style="color:var(--ink-soft); font-size:14px; margin-bottom:30px;"></p>

        <!-- Dynamic Content Panels -->
        <div id="panelContainer">
            <!-- Panels injected by JavaScript -->
        </div>
    </div>
</div>

<!-- Edit Employee Modal -->
<div class="modal" id="editEmployeeModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('editEmployeeModal')">&times;</button>
        <h2 style="margin-bottom: 20px;">Edit Employee Details</h2>
        <form id="editEmployeeForm">
            <input type="hidden" id="editEmpId">
            <div class="form-grid">
                <div class="field"><label>Full Name</label><input type="text" id="editName" required></div>
                <div class="field"><label>Email</label><input type="email" id="editEmail" required></div>
                <div class="field"><label>Phone Number</label><input type="text" id="editPhone"></div>
                <div class="field"><label>Department</label><input type="text" id="editDept" required></div>
                <div class="field"><label>Designation</label><input type="text" id="editDesg" required></div>
                <div class="field">
                    <label>Status</label>
                    <select id="editStatus" style="width:100%; padding:13px 15px; border-radius:12px; border:1px solid rgba(255,255,255,.15); background:#0b1928; color:white; outline:none;">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 20px; width: 100%;">Save Changes</button>
        </form>
    </div>
</div>

<!-- Start New DM Modal -->
<div class="modal" id="newDMModal">
    <div class="modal-content" style="max-width: 480px;">
        <button class="close-modal" onclick="closeModal('newDMModal')">&times;</button>
        <h2 style="margin-bottom: 20px;">Start 1-on-1 Chat</h2>
        <div style="margin-bottom: 15px;">
            <input type="text" id="dmUserSearch" placeholder="Search employees..." onkeyup="filterDMUsersList()" style="width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none;">
        </div>
        <div id="dmUsersList" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
            <!-- Loaded dynamically -->
        </div>
    </div>
</div>

<!-- Create Group Modal -->
<div class="modal" id="createGroupModal">
    <div class="modal-content" style="max-width: 480px;">
        <button class="close-modal" onclick="closeModal('createGroupModal')">&times;</button>
        <h2 style="margin-bottom: 20px;">Create Group Chat</h2>
        <form id="createGroupForm" onsubmit="submitCreateGroup(event)">
            <div class="field">
                <label>Group Name</label>
                <input type="text" id="newGroupName" required placeholder="e.g. Project Apollo Taskforce">
            </div>
            <div style="margin-top: 15px; margin-bottom: 10px; font-size: 13px; font-weight: 600; color: var(--orange);">SELECT INITIAL MEMBERS</div>
            <div id="groupSelectMembersList" style="max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;">
                <!-- User checkboxes loaded dynamically -->
            </div>
            <button type="submit" class="btn-primary" style="width: 100%;">Create Group</button>
        </form>
    </div>
</div>

<!-- Add Group Member Modal -->
<div class="modal" id="addGroupMemberModal">
    <div class="modal-content" style="max-width: 450px;">
        <button class="close-modal" onclick="closeModal('addGroupMemberModal')">&times;</button>
        <h2 style="margin-bottom: 20px;">Add Member to Group</h2>
        <div id="addGroupMembersList" style="max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
            <!-- Users list loaded dynamically -->
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin.startsWith('file:') ? "http://localhost:5000" : window.location.origin;
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "null");

if (!token || !user) {
    window.location.href = "login.html";
}

document.getElementById("userGreeting").textContent = `Hello, ${user.name} (${user.role.toUpperCase()})`;

// --- Sidebar Menu Defs ---
let currentUser = user;

async function initDashboard() {
    try {
        const details = await apiCall("/chat/user-details");
        currentUser = details;
        localStorage.setItem("user", JSON.stringify(details));
        document.getElementById("userGreeting").textContent = `Hello, ${currentUser.name} (${currentUser.role.toUpperCase()})`;
    } catch (e) {
        console.error("Could not fetch fresh user details", e);
    }
    renderSidebar();
}

function renderSidebar() {
    const sidebar = document.getElementById("sidebarMenu");
    sidebar.innerHTML = "";
    
    let list = [];
    if (currentUser.role === 'admin') {
        list = [
            { id: "overview", label: "Overview", icon: "📊" },
            { id: "employees", label: "Employees", icon: "👥" },
            { id: "attendance", label: "Attendance Register", icon: "📅" },
            { id: "leaves", label: "Leave Requests", icon: "✉️" },
            { id: "recruitment", label: "Recruitment Board", icon: "🎯" },
            { id: "announcements", label: "Announcements", icon: "📢" },
            { id: "reports", label: "Reports & Audits", icon: "📈" },
            { id: "messages", label: "Messages (DMs)", icon: "💬" },
            { id: "groups", label: "Groups", icon: "👥" },
            { id: "oversight", label: "Oversight", icon: "🔍" }
        ];
    } else if (currentUser.role === 'employee') {
        list = [
            { id: "emp_overview", label: "Overview", icon: "📊" },
            { id: "emp_attendance", label: "My Attendance", icon: "📅" },
            { id: "emp_leaves", label: "Apply Leave", icon: "✉️" },
            { id: "emp_announcements", label: "Announcements", icon: "📢" },
            { id: "profile", label: "My Profile", icon: "👤" },
            { id: "messages", label: "Messages (DMs)", icon: "💬" },
            { id: "groups", label: "Groups", icon: "👥" }
        ];
        if (currentUser.is_team_leader) {
            list.push({ id: "oversight", label: "Group Oversight", icon: "👁️" });
        }
    } else {
        list = [
            { id: "cand_overview", label: "My Applications", icon: "💼" },
            { id: "profile", label: "My Profile", icon: "👤" }
        ];
    }
    
    list.forEach((m, idx) => {
        const a = document.createElement("a");
        a.className = `sidebar-link ${idx === 0 ? "active" : ""}`;
        a.innerHTML = `<span>${m.icon}</span> ${m.label}`;
        a.onclick = () => switchTab(m.id, a);
        sidebar.appendChild(a);
    });

    // Auto load first tab on start
    if (list.length > 0) {
        switchTab(list[0].id, sidebar.firstChild);
    }
}

// Logout Helper
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

// Switch Tabs/Panels
function switchTab(panelId, element) {
    document.querySelectorAll(".sidebar-link").forEach(l => l.classList.remove("active"));
    if (element) element.classList.add("active");

    if (chatPollingInterval) {
        clearInterval(chatPollingInterval);
        chatPollingInterval = null;
    }

    document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));
    const targetPanel = document.getElementById(`panel_${panelId}`);
    if (targetPanel) {
        targetPanel.classList.add("active");
        loadPanelData(panelId);
    }
}

// Open / Close Modal
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// --- AJAX Fetch Helper ---
async function apiCall(endpoint, method = "GET", body = null) {
    const options = {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        }
    };
    if (body) options.body = JSON.stringify(body);
    
    try {
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        let data = null;
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
            data = await res.json();
        }
        if (!res.ok) {
            const errMsg = (data && data.error) ? data.error : `Request failed with status ${res.status}`;
            throw new Error(errMsg);
        }
        return data;
    } catch (err) {
        alert(err.message);
        throw err;
    }
}

// Generate Panel HTML Layouts on load
const container = document.getElementById("panelContainer");

const layouts = {
    // === ADMIN PANELS ===
    overview: `

Object.keys(layouts).forEach(panelId => {
    const div = document.createElement("div");
    div.id = `panel_${panelId}`;
    div.className = "section-panel";
    div.innerHTML = layouts[panelId];
    container.appendChild(div);
});

// Load dynamic dashboard
initDashboard();


// --- Sub-Controller Loading Logic ---
function loadPanelData(panelId) {
    if (panelId === "overview") loadAdminOverview();
    else if (panelId === "employees") loadAdminEmployees();
    else if (panelId === "attendance") loadAdminAttendance();
    else if (panelId === "leaves") loadAdminLeaves();
    else if (panelId === "recruitment") loadAdminRecruitment();
    else if (panelId === "announcements") loadAdminAnnouncements();
    else if (panelId === "reports") { /* triggered by buttons */ }
    else if (panelId === "emp_overview") loadEmpOverview();
    else if (panelId === "emp_attendance") loadEmpAttendance();
    else if (panelId === "emp_leaves") loadEmpLeaves();
    else if (panelId === "emp_announcements") loadEmpAnnouncements();
    else if (panelId === "profile") loadProfile();
    else if (panelId === "cand_overview") loadCandidateOverview();
    else if (panelId === "messages") loadMessagesPanel();
    else if (panelId === "groups") loadGroupsPanel();
    else if (panelId === "oversight") loadOversightPanel();
}

// 1. Admin Overview
async function loadAdminOverview() {
    const stats = await apiCall("/dashboard/stats");
    document.getElementById("stat_total_emp").textContent = stats.active_employees;
    document.getElementById("stat_present").textContent = stats.present_today;
    document.getElementById("stat_absent").textContent = stats.absent_today;
    document.getElementById("stat_pending_leaves").textContent = stats.pending_leaves;
    document.getElementById("stat_open_jobs").textContent = stats.active_jobs;
    document.getElementById("stat_total_apps").textContent = stats.total_applications;

    const noticeList = document.getElementById("adminNoticeList");
    noticeList.innerHTML = "";
    const notices = await apiCall("/announcements");
    if (notices.length === 0) noticeList.innerHTML = `<div style="color:var(--ink-faint); font-size:13px;">No announcements published.</div>`;
    notices.slice(0, 3).forEach(n => {
        noticeList.innerHTML += `
            <div style="background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); padding:15px; border-radius:12px;">
                <h4 style="font-weight:600; font-size:14px; margin-bottom:4px;">${n.title}</h4>
                <p style="font-size:13px; color:var(--ink-soft);">${n.content}</p>
                <div style="font-size:11px; color:var(--ink-faint); margin-top:8px;">${new Date(n.created_at).toLocaleString()}</div>
            </div>
        `;
    });
}

// 2. Admin Employees Management
let allEmployees = [];
async function loadAdminEmployees() {
    allEmployees = await apiCall("/employees");
    renderEmployeesTable(allEmployees);
}

function renderEmployeesTable(list) {
    const tbody = document.getElementById("employeesTableBody");
    tbody.innerHTML = "";
    list.forEach(emp => {
        tbody.innerHTML += `
            <tr>
                <td>${emp.employee_id}</td>
                <td>${emp.name}</td>
                <td>${emp.email}</td>
                <td>${emp.department}</td>
                <td>${emp.designation}</td>
                <td><span class="badge ${emp.status.toLowerCase()}">${emp.status}</span></td>
                <td>
                    <button onclick="editEmployeePopup(${JSON.stringify(emp).replace(/"/g, '&quot;')})" class="btn-action btn-edit">Edit</button>
                    <button onclick="deleteEmployee(${emp.id})" class="btn-action btn-reject">Delete</button>
                </td>
            </tr>
        `;
    });
}

function filterEmployees() {
    const q = document.getElementById("empSearchInput").value.toLowerCase();
    const filtered = allEmployees.filter(emp => 
        emp.name.toLowerCase().includes(q) || 
        emp.employee_id.toLowerCase().includes(q) || 
        emp.department.toLowerCase().includes(q) || 
        emp.designation.toLowerCase().includes(q)
    );
    renderEmployeesTable(filtered);
}

document.getElementById("addEmployeeForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const payload = {
        employee_id: document.getElementById("addEmpId").value,
        name: document.getElementById("addName").value,
        email: document.getElementById("addEmail").value,
        password: document.getElementById("addPassword").value,
        phone_number: document.getElementById("addPhone").value,
        department: document.getElementById("addDept").value,
        designation: document.getElementById("addDesg").value,
        date_of_joining: document.getElementById("addJoinDate").value
    };
    await apiCall("/employees", "POST", payload);
    alert("Employee profile created successfully!");
    closeModal("addEmployeeModal");
    this.reset();

function viewResumeFile(filename) {
    // Authenticated download
    fetch(`${API_BASE}/uploads/resumes/${filename}`, {
        headers: { "Authorization": `Bearer ${token}` }
    })
    .then(res => res.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
    })
    .catch(err => alert("Error downloading resume file: " + err));
}

let chatPollingInterval = null;
let activeConversationId = null;
let activeGroupConversationId = null;
let activeOversightConversationId = null;

let allUsers = [];

// Messages Panel (DMs)
async function loadMessagesPanel() {

async function refreshDMList() {
    try {
        const res = await apiCall("/chat/conversations");
        const list = res.filter(c => c.type === 'dm');
        const container = document.getElementById("dmList");
        container.innerHTML = "";
        
        if (list.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:var(--ink-soft); font-size:12px; text-align:center;">No direct messages yet. Click "+ New DM" to start.</div>`;
            return;
        }
        
        list.forEach(c => {
            const isSelected = activeConversationId === c.id;
            const badgeHtml = c.unread_count > 0 ? `<span class="badge">${c.unread_count}</span>` : '';
            const lastMsg = c.last_message ? c.last_message : 'No messages yet';
            const name = c.dm_user ? c.dm_user.name : 'Unknown Employee';
            
            container.innerHTML += `
                <div class="chat-list-item ${isSelected ? 'active' : ''}" onclick="selectDMConversation(${c.id}, '${name.replace(/'/g, "\\'")}')">
                    <div>
                        <div class="title">${name}</div>
                        <div class="subtitle">${lastMsg}</div>
                    </div>
                    <div>${badgeHtml}</div>
                </div>
            `;
        });
    } catch (e) {
        console.error(e);
    }
}

async function pollMessages() {
    await refreshDMList();
    if (activeConversationId) {
        await refreshDMThread(false);
    }
}

async function selectDMConversation(id, partnerName) {
    activeConversationId = id;
    document.getElementById("dmPlaceholder").style.display = "none";
    document.getElementById("dmMainArea").style.display = "flex";
    document.getElementById("dmActiveTitle").textContent = partnerName;
    
    document.querySelectorAll("#dmList .chat-list-item").forEach(item => {
        item.classList.remove("active");
    });
    
    try {
        await apiCall(`/chat/conversations/${id}/read`, "POST");
    } catch(e) {}
    
    await refreshDMThread(true);
    await refreshDMList();
}

async function refreshDMThread(forceScroll = false) {
    if (!activeConversationId) return;
    try {
        const res = await apiCall(`/chat/conversations/${activeConversationId}/messages`);
        const messagesDiv = document.getElementById("dmMessages");
        const isAtBottom = messagesDiv.scrollHeight - messagesDiv.clientHeight <= messagesDiv.scrollTop + 40;
        
        messagesDiv.innerHTML = "";
        
        if (res.messages.length === 0) {
            messagesDiv.innerHTML = `<div style="text-align:center; color:var(--ink-faint); margin-top:20px; font-size:13px;">No messages in this chat yet. Say hello!</div>`;
        } else {
            res.messages.forEach(m => {
                const isMine = m.sender_id === currentUser.id;
                const bubbleClass = isMine ? 'outgoing' : 'incoming';
                const senderHtml = isMine ? '' : `<div class="sender">${m.sender_name}</div>`;
                const timeStr = m.sent_at ? new Date(m.sent_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
                
                messagesDiv.innerHTML += `
                    <div class="msg-bubble ${bubbleClass}">
                        ${senderHtml}
                        <div>${m.content}</div>
                        <div class="time">${timeStr}</div>
                    </div>
                `;
            });
        }
        
        if (forceScroll || isAtBottom) {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    } catch(e) {
        console.error(e);
    }
}

async function sendChatMessage(type) {
    if (type === 'dm') {
        const input = document.getElementById("dmInput");
        const val = input.value.trim();
        if (!val || !activeConversationId) return;
        input.value = "";
        try {
            await apiCall(`/chat/conversations/${activeConversationId}/messages`, "POST", { content: val });
            await refreshDMThread(true);
        } catch(e) {}
    } else {
        const input = document.getElementById("groupInput");
        const val = input.value.trim();
        if (!val || !activeGroupConversationId) return;
        input.value = "";
        try {
            await apiCall(`/chat/conversations/${activeGroupConversationId}/messages`, "POST", { content: val });
            await refreshGroupThread(true);
        } catch(e) {}
    }
}

function handleChatKey(e, type) {
    if (e.key === 'Enter') {
        sendChatMessage(type);
    }
}

                    <div style="font-size:11px; color:var(--ink-soft);">${u.email}</div>
                </div>
                <button onclick="startDMWithUser(${u.id}, '${u.name.replace(/'/g, "\\'")}')" class="btn-primary" style="padding:6px 12px; font-size:11px;">Chat</button>
            </div>
        `;
    });
}

function filterDMUsersList() {
    const q = document.getElementById("dmUserSearch").value.toLowerCase();
    const filtered = allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
    renderDMUsersList(filtered);
}

async function startDMWithUser(userId, userName) {
    try {
        const res = await apiCall("/chat/conversations", "POST", { type: "dm", members: [userId] });
        closeModal("newDMModal");
        await refreshDMList();
        selectDMConversation(res.id, userName);
    } catch(e) {}
}

// Groups Panel (DMs)
async function loadGroupsPanel() {
    activeGroupConversationId = null;
    document.getElementById("groupMainArea").style.display = "none";
    document.getElementById("groupPlaceholder").style.display = "flex";
    
    const isTLOrAdmin = currentUser.role === 'admin' || currentUser.is_team_leader;
    document.getElementById("btnCreateGroupSidebar").style.display = isTLOrAdmin ? "block" : "none";
    
    await refreshGroupList();
    chatPollingInterval = setInterval(pollGroups, 3000);
}

async function refreshGroupList() {
    try {
        const res = await apiCall("/chat/conversations");
        const list = res.filter(c => c.type === 'group');
        const container = document.getElementById("groupList");
        container.innerHTML = "";
        
        if (list.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:var(--ink-soft); font-size:12px; text-align:center;">No groups yet.</div>`;
            return;
        }
        
        list.forEach(c => {
            const isSelected = activeGroupConversationId === c.id;
            const badgeHtml = c.unread_count > 0 ? `<span class="badge">${c.unread_count}</span>` : '';
            const lastMsg = c.last_message ? c.last_message : 'No activity';
            
            container.innerHTML += `
                <div class="chat-list-item ${isSelected ? 'active' : ''}" onclick="selectGroupConversation(${c.id}, '${c.group_name.replace(/'/g, "\\'")}')">
                    <div>
                        <div class="title">👥 ${c.group_name}</div>
                        <div class="subtitle">${lastMsg}</div>
                    </div>
                    <div>${badgeHtml}</div>
                </div>
            `;
        });
    } catch(e) {
        console.error(e);
    }
}

async function pollGroups() {
    await refreshGroupList();
    if (activeGroupConversationId) {
        await refreshGroupThread(false);
    }
}

async function selectGroupConversation(id, name) {
    activeGroupConversationId = id;
    document.getElementById("groupPlaceholder").style.display = "none";
    document.getElementById("groupMainArea").style.display = "flex";
    document.getElementById("groupActiveTitle").textContent = name;
    
    try {
        await apiCall(`/chat/conversations/${id}/read`, "POST");
    } catch(e) {}
    
    const actions = document.getElementById("groupActionsArea");
    actions.innerHTML = "";
    if (currentUser.role === 'admin' || currentUser.is_team_leader) {
        actions.innerHTML = `<button onclick="openAddMemberModal(${id})" class="btn-primary" style="padding: 6px 12px; font-size:12px;">+ Add Employee</button>`;
    }
    
    await refreshGroupThread(true);
    await refreshGroupList();
}

async function refreshGroupThread(forceScroll = false) {
    if (!activeGroupConversationId) return;
    try {
        const res = await apiCall(`/chat/conversations/${activeGroupConversationId}/messages`);
        
        // Update Title & Simulated Online count
        const membersCount = res.members ? res.members.length : 0;
        const onlineCount = Math.max(1, Math.ceil(membersCount * 0.45));
        const groupTitleElem = document.getElementById("groupActiveTitle");
        
        groupTitleElem.innerHTML = `
            <div class="title-area">
                <h3 style="margin: 0; font-size: 18px; font-weight: 700; color: #fff;">${res.conversation_name || 'Group Chat'}</h3>
                <div class="meta" style="font-size: 12px; color: var(--ink-soft); margin-top: 4px;">${membersCount} Members &bull; ${onlineCount} Online</div>
            </div>
        `;
        
        const messagesDiv = document.getElementById("groupMessages");
        const isAtBottom = messagesDiv.scrollHeight - messagesDiv.clientHeight <= messagesDiv.scrollTop + 40;
        
        messagesDiv.innerHTML = "";
        
        res.messages.forEach(m => {
            const isMine = m.sender_id === currentUser.id;
            const bubbleClass = isMine ? 'outgoing' : 'incoming';
            const senderHtml = isMine ? '' : `<div class="sender">${m.sender_name}</div>`;
            const timeStr = m.sent_at ? new Date(m.sent_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            
            messagesDiv.innerHTML += `
                <div class="msg-bubble ${bubbleClass}">
                    ${senderHtml}
                    <div>${m.content}</div>
                    <div class="time">${timeStr}</div>
                </div>
            `;
        });
        
        if (forceScroll || isAtBottom) {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        const membersList = document.getElementById("groupMembersList");
        membersList.innerHTML = "";
        res.members.forEach(m => {
            const roleBadge = m.role === 'admin' ? '<span style="color:var(--orange); font-size:9px; font-weight:700; margin-left:4px;">ADMIN</span>' : '';
            membersList.innerHTML += `
                <div class="member-card">
                    <div class="name">${m.name} ${roleBadge}</div>
                    <div class="status"><span style="width:6px; height:6px; border-radius:50%; background:#00e676; display:inline-block;"></span> Online</div>
                </div>
            `;
        });
    } catch(e) {
        console.error(e);
    }
}

async function openCreateGroupModal() {
    document.getElementById("newGroupName").value = "";
    openModal("createGroupModal");
    
    try {
        const users = await apiCall("/chat/users");
        const listDiv = document.getElementById("groupSelectMembersList");
        listDiv.innerHTML = "";
        users.forEach(u => {
            listDiv.innerHTML += `
                <label style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); padding:8px 12px; border-radius:8px; cursor:pointer;">
                    <input type="checkbox" name="group_select_user" value="${u.id}" style="cursor:pointer;">
                    <div>
                        <div style="font-size:12px; font-weight:600; color:#fff;">${u.name}</div>
                        <div style="font-size:10px; color:var(--ink-soft);">${u.role.toUpperCase()}</div>
                    </div>
                </label>
            `;
        });
    } catch(e) {}
}

async function submitCreateGroup(e) {
    e.preventDefault();
    const groupName = document.getElementById("newGroupName").value.trim();
    if (!groupName) return;
    
    const checked = document.querySelectorAll('input[name="group_select_user"]:checked');
    const selectedIds = [];
    checked.forEach(chk => {
        selectedIds.push(parseInt(chk.value));
    });
    
    try {
        const res = await apiCall("/chat/conversations", "POST", {
            type: "group",
            name: groupName,
            members: selectedIds
        });
        closeModal("createGroupModal");
        await refreshGroupList();
        selectGroupConversation(res.id, groupName);
    } catch(e) {}
}

async function openAddMemberModal(groupId) {
    openModal("addGroupMemberModal");
    const container = document.getElementById("addGroupMembersList");
    container.innerHTML = `<div style="text-align:center; color:var(--ink-soft);">Loading...</div>`;
    
    try {
        const users = await apiCall("/chat/users");
        const res = await apiCall(`/chat/conversations/${groupId}/messages`);
        const memberIds = res.members.map(m => m.id);
        
        const eligibleUsers = users.filter(u => !memberIds.includes(u.id));
        container.innerHTML = "";
        
        if (eligibleUsers.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:var(--ink-faint); font-size:13px; padding:15px;">All employees are members of this group.</div>`;
            return;
        }
        
        eligibleUsers.forEach(u => {
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); padding:8px 12px; border-radius:10px;">
                    <div>
                        <div style="font-weight:600; font-size:13px; color:#fff;">${u.name}</div>
                        <div style="font-size:10px; color:var(--ink-soft);">${u.email}</div>
                    </div>
                    <button onclick="addGroupMember(${groupId}, ${u.id})" class="btn-primary" style="padding:6px 12px; font-size:11px;">Add</button>
                </div>
            `;
        });
    } catch(e) {}
}

async function addGroupMember(groupId, userId) {
    try {
        await apiCall(`/chat/groups/${groupId}/members`, "POST", { user_id: userId });
        closeModal("addGroupMemberModal");
        await refreshGroupThread(true);
    } catch(e) {}
}

// Oversight Panel (Admin & TL Only)
async function loadOversightPanel() {
    activeOversightConversationId = null;
    document.getElementById("oversightMainArea").style.display = "none";
    document.getElementById("oversightPlaceholder").style.display = "flex";
    await refreshOversightList();
    chatPollingInterval = setInterval(pollOversight, 3000);
}

async function refreshOversightList() {
    try {
        let list = [];
        if (currentUser.role === 'admin') {
            list = await apiCall("/chat/admin/all");
        } else {
            list = await apiCall("/chat/team-leader/groups");
        }
        
        const container = document.getElementById("oversightList");
        container.innerHTML = "";
        
        if (list.length === 0) {
            container.innerHTML = `<div style="padding:20px; color:var(--ink-soft); font-size:12px; text-align:center;">No conversations active in the system.</div>`;
            return;
        }
        
        list.forEach(c => {
            const isSelected = activeOversightConversationId === c.id;
            let displayTitle = "";
            let displaySub = c.last_message ? c.last_message : 'No activity';
            
            if (c.type === 'dm') {
                const names = c.dm_members ? c.dm_members.map(m => m.name).join(' & ') : 'Direct Message';
                displayTitle = `👤 DM: ${names}`;
            } else {
                displayTitle = `👥 Group: ${c.group_name}`;
            }
            
            container.innerHTML += `
                <div class="chat-list-item ${isSelected ? 'active' : ''}" onclick="selectOversightConversation(${c.id}, '${c.type}', '${displayTitle.replace(/'/g, "\\'")}')">
                    <div>
                        <div class="title">${displayTitle}</div>
                        <div class="subtitle">${displaySub}</div>
                    </div>
                </div>
            `;
        });
    } catch(e) {
        console.error(e);
    }
}

async function pollOversight() {
    await refreshOversightList();
    if (activeOversightConversationId) {
        await refreshOversightThread();
    }
}

async function selectOversightConversation(id, type, title) {
    activeOversightConversationId = id;
    activeOversightType = type;
    document.getElementById("oversightPlaceholder").style.display = "none";
    document.getElementById("oversightMainArea").style.display = "flex";
    document.getElementById("oversightActiveTitle").textContent = title;
    
    await refreshOversightThread();
}

async function refreshOversightThread() {
    if (!activeOversightConversationId) return;
    try {
        const res = await apiCall(`/chat/conversations/${activeOversightConversationId}/messages`);
        const messagesDiv = document.getElementById("oversightMessages");
        messagesDiv.innerHTML = "";
        
        res.messages.forEach(m => {
            const timeStr = m.sent_at ? new Date(m.sent_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            messagesDiv.innerHTML += `
                <div class="msg-bubble incoming" style="align-self: flex-start; max-width: 80%;">
                    <div class="sender" style="color: var(--orange);">${m.sender_name}</div>
                    <div>${m.content}</div>
                    <div class="time">${timeStr}</div>
                </div>
            `;
        });
        
        const membersPane = document.getElementById("oversightMembersPane");
        if (activeOversightType === 'group' && res.members && res.members.length > 0) {
            membersPane.style.display = "flex";
            const membersList = document.getElementById("oversightMembersList");
            membersList.innerHTML = "";
            res.members.forEach(m => {
                const roleBadge = m.role === 'admin' ? '<span style="color:var(--orange); font-size:9px; font-weight:700; margin-left:4px;">ADMIN</span>' : '';
                membersList.innerHTML += `
                    <div class="member-card">
                        <div class="name">${m.name} ${roleBadge}</div>
                        <div class="status"><span style="width:6px; height:6px; border-radius:50%; background:#00e676; display:inline-block;"></span> Online</div>
                    </div>
                `;
            });
        } else {
            membersPane.style.display = "none";
        }
    } catch(e) {
        console.error(e);
    }
}
</script>
