<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Elevate IQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Preloader Overlay -->
<div id="preloader" class="preloader-overlay">
  <video id="preloader-video" class="preloader-video" autoplay muted playsinline>
    <source src="logo_animated.mp4" type="video/mp4">
  </video>
</div>
<script src="preloader.js"></script>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="openings.html">Careers</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Portfolio</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
    <a href="register.html" class="btn-primary">Sign up</a>
  </div>
</nav>

<section class="auth-wrap">
  <div class="auth-card">
    <h1>Set New Password</h1>
    <p class="sub">Enter your new secure password details below</p>

    <form id="resetForm">
      <div class="field"><label for="password">New Password</label><input type="password" id="password" minlength="6" required></div>
      <div class="field"><label for="confirmPassword">Confirm Password</label><input type="password" id="confirmPassword" minlength="6" required></div>
      <button type="submit" class="btn-primary auth-submit">Save Password</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>
  </div>
</section>

<footer>
  © 2026 Elevate IQ. Building the next generation of intelligent tools.
</footer>

<script>
const API_BASE = "http://localhost:5000";

// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  document.getElementById('errorMsg').textContent = 'Error: Reset token is missing. Please request a new password reset link.';
  document.getElementById('errorMsg').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}

document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match.';
    errorMsg.style.display = 'block';
    return;
  }

  const payload = {
    token: token,
    password: password
  };

  try {
    const res = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = 'Password reset successful. Redirecting to login...';
      successMsg.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } else {
      errorMsg.textContent = data.error || 'Failed to reset password.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Make sure the backend is running.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
