<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Elevate IQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Preloader Overlay -->
<div id="preloader" class="preloader-overlay">
  <video id="preloader-video" class="preloader-video" autoplay muted playsinline>
    <source src="logo_animated.mp4" type="video/mp4">
  </video>
</div>
<script src="preloader.js"></script>

<!-- Ambient Background Video -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="openings.html">Careers</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Portfolio</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
    <a href="register.html" class="btn-primary">Sign up</a>
  </div>
</nav>

<section class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to continue to Elevate IQ</p>

    <form id="loginForm">
      <div class="field"><label for="email">Email address or Employee ID</label><input type="text" id="email" required></div>
      <div class="field"><label for="password">Password</label><input type="password" id="password" required></div>
      <div style="text-align: right; margin-bottom: 12px; margin-top: -8px;">
        <a href="forgot-password.html" style="font-size: 12px; color: var(--blue); text-decoration: none;">Forgot Password?</a>
      </div>
      <button type="submit" class="btn-primary auth-submit">Log in</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">Don't have an account? <a href="register.html">Create one</a></div>
  </div>
</section>

<footer>
  © 2026 Elevate IQ. Building the next generation of intelligent tools.
</footer>

<script>
const API_BASE = "http://localhost:5000";

// Check if user already logged in, redirect
if (localStorage.getItem("token")) {
  window.location.href = "dashboard.html";
}

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const payload = {
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  };

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message || 'Login successful.';
      successMsg.style.display = 'block';
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } else {
      errorMsg.textContent = data.error || 'Invalid email or password.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Make sure the backend is running.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
