<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — EduTech Academy</title>
<link rel="shortcut icon" href="logo.png" type="image/png">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --primary: #ff7a00;
    --secondary: #0096ff;
    --accent: #ff8a00;
    --success: #22C55E;
    --bg: #020617;
    --bg-soft: #050b1f;
    --card: rgba(15, 23, 36, 0.6);
    --card-hover: rgba(20, 35, 60, 0.8);
    --text: #F8FAFC;
    --muted: #94A3B8;
    --line: rgba(148, 163, 184, 0.12);
    --glass-border: rgba(255, 255, 255, 0.08);
    --orange-glow: rgba(255, 122, 0, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Backdrop gradient effects */
  .bg-canvas {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, var(--bg-soft) 0%, var(--bg) 100%);
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.1;
  }
  .orb1 { top: -10%; left: -10%; width: 45%; height: 45%; background: var(--primary); }
  .orb2 { bottom: -10%; right: -10%; width: 50%; height: 50%; background: var(--secondary); }

  /* Navigation */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(2, 6, 23, 0.6);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    text-decoration: none;
  }
  .logo img {
    height: 28px;
    width: auto;
    object-fit: contain;
  }
  .logo span {
    font-size: 8px;
    color: #3FD0FF;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .user-greeting {
    font-size: 13.5px;
    color: var(--muted);
  }
  .btn-logout {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    transition: all 0.3s ease;
  }
  .btn-logout:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.4);
    color: #f87171;
  }

  /* Dashboard Container */
  .dash-container {
    flex: 1;
    display: flex;
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
    padding: 30px;
    gap: 30px;
  }

  /* Sidebar styling */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .sidebar-link:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.04);
  }
  .sidebar-link.active {
    color: white;
    background: linear-gradient(135deg, rgba(255, 122, 0, 0.18), rgba(0, 150, 255, 0.15));
    border: 1px solid rgba(255, 122, 0, 0.2);
    box-shadow: 0 4px 15px -4px var(--orange-glow);
  }
  .sidebar-icon {
    width: 18px;
    height: 18px;
  }

  /* Content Workspace */
  .dash-content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .dash-header {
    margin-bottom: 24px;
  }
  .dash-header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .dash-header p {
    color: var(--muted);
    font-size: 13.5px;
  }

  /* Dynamic panels */
  .section-panel {
    display: none;
    animation: fadeIn 0.4s ease forwards;
  }
  .section-panel.active {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Components: Glass Card */
  .glass-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* Tables */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: rgba(15, 23, 36, 0.3);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13.5px;
  }
  th {
    background: rgba(255, 255, 255, 0.02);
    padding: 14px 16px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    color: var(--text);
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background: rgba(255, 255, 255, 0.01);
  }

  /* Badges */
  .badge {
    display: inline-flex;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge.beginner { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
  .badge.intermediate { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
  .badge.advanced { background: rgba(168, 85, 247, 0.1); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
  .badge.active { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
  .badge.pending { background: rgba(234, 179, 8, 0.1); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.2); }

  /* Course Card Grid */
  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .course-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s ease;
  }
  .course-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 122, 0, 0.25);
    background: var(--card-hover);
    box-shadow: 0 10px 30px -10px var(--orange-glow);
  }
  .course-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .course-icon-box {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(255, 122, 0, 0.1);
    border: 1px solid rgba(255, 122, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
  }
  .course-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 8px;
    color: white;
  }
  .course-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
  }
  .course-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 10px;
  }
  .course-price {
    font-size: 18px;
    font-weight: 700;
    color: white;
  }
  .course-price-old {
    font-size: 13px;
    text-decoration: line-through;
    color: var(--muted);
    margin-left: 6px;
  }

  /* Form Elements */
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--secondary);
    background: rgba(255, 255, 255, 0.05);
  }
  .field select option {
    background: #0b1528;
    color: white;
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    font-weight: 600;
    border-radius: 10px;
    font-size: 13.5px;
    box-shadow: 0 4px 12px rgba(0, 150, 255, 0.25);
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    opacity: 0.95;
  }
  .btn-ghost {
    padding: 10px 20px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.01);
    color: var(--text);
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-ghost:hover {
    border-color: var(--muted);
    background: rgba(255, 255, 255, 0.03);
  }
  .btn-danger {
    padding: 6px 12px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #f87171;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .btn-danger:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  /* Grid details stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
  }
  .stat-card h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-card .val {
    font-size: 24px;
    font-weight: 700;
    color: white;
  }

  /* Modals */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(2, 6, 23, 0.85);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal.open {
    display: flex;
  }
  .modal-content {
    background: #0b1220;
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    padding: 30px;
    position: relative;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 22px;
    color: var(--muted);
    cursor: pointer;
  }
  .modal-close:hover {
    color: white;
  }
</style>
</head>

  <div class="orb orb1"></div>

</div>

<nav>

    </div>

</div>

<!-- ==================== POPUP MODALS ==================== -->

<!-- Add/Edit Course Modal -->
<div class="modal" id="courseModal">

        <input type="number" id="coursePrice" placeholder="e.g. 35000" required>

        <input type="number" id="courseOldPrice" placeholder="e.g. 42000">

      <div class="field">
        <label>Theme Icon Category</label>
        <select id="courseIcon">
          <option value="layers">Layers (Default)</option>
          <option value="code">Code Editor</option>
          <option value="coffee">Coffee (Java/Backend)</option>
          <option value="brain">Brain (AI/ML)</option>
          <option value="chart">Chart (Data Science)</option>
          <option value="cloud">Cloud (DevOps)</option>
          <option value="server">Server (Database)</option>
          <option value="shield">Shield (Security)</option>
          <option value="palette">Palette (UI/UX)</option>

  </div>
</div>

<!-- Add/Edit Employee Modal -->

        </div>
        <div class="field">

          <input type="text" id="empName" placeholder="e.g. Robert Martin" required>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="empEmail" placeholder="e.g. unclebob@example.com" required>

        </div>
        <div class="field">

        <div class="field">

      </div>
    </form>
  </div>
</div>

<!-- ==================== JAVASCRIPT LOGIC ==================== -->
<script>
// Check Authentication session state
const API_BASE = window.location.origin;
const token = localStorage.getItem("edutech_token");
const user = JSON.parse(localStorage.getItem("edutech_user") || "null");

if (!token || !user) {
    window.location.href = "login.html";
}

// Display Name greeting
document.getElementById("userGreeting").textContent = `Hello, ${user.name} (${user.role.toUpperCase()})`;

// Global API Call wrapper
async function apiCall(endpoint, method = "GET", body = null) {
    const options = {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        }
    };
    if (body) options.body = JSON.stringify(body);
    
    try {
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        let data = null;
        const contentType = res.headers.get("content-type");
        if (contentType && contentType.includes("application/json")) {
            data = await res.json();
        }
        if (!res.ok) {
            const errMsg = (data && data.error) ? data.error : `Request failed with status ${res.status}`;
            throw new Error(errMsg);
        }
        return data;
    } catch (err) {
        alert(err.message);
        throw err;
    }
}

function logout() {
    localStorage.removeItem("edutech_token");
    localStorage.removeItem("edutech_user");
    window.location.href = "index.html";
}

function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// Vector icon mappings for Lucide rendering
const iconSVGs = {
  layers: '<i data-lucide="layers" class="sidebar-icon"></i>',
  code: '<i data-lucide="code-2" class="sidebar-icon"></i>',
  coffee: '<i data-lucide="coffee" class="sidebar-icon"></i>',
  brain: '<i data-lucide="brain" class="sidebar-icon"></i>',
  chart: '<i data-lucide="bar-chart" class="sidebar-icon"></i>',
  cloud: '<i data-lucide="cloud" class="sidebar-icon"></i>',
  server: '<i data-lucide="server" class="sidebar-icon"></i>',
  shield: '<i data-lucide="shield" class="sidebar-icon"></i>',
  palette: '<i data-lucide="palette" class="sidebar-icon"></i>'
};

function formatRupee(n) {
  return "₹" + Number(n).toLocaleString("en-IN");
}

// Layout definitions based on role
const layouts = {
  // STUDENT VIEW LAYOUTS
  student_courses: `

    </div>

    </div>
  `,
  student_live_classes: `

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Course Program</th>

            <th>Platform</th>
            <th>Scheduled Time</th>
            <th>Action</th>

        </thead>

        </tbody>
      </table>

  `,
  student_profile: `
    <div class="glass-card" style="max-width: 500px; margin: 0 auto;">
      <h2 style="font-size:18px; margin-bottom:20px;">Student Profile Settings</h2>
      <form id="studentProfileForm" onsubmit="saveProfile(event)">

const panelContainer = document.getElementById("panelContainer");
Object.keys(layouts).forEach(panelId => {
  const div = document.createElement("div");
  div.id = `panel_${panelId}`;
  div.className = "section-panel";

// Switching sidebar tabs controller
function switchTab(panelId) {
  document.querySelectorAll(".sidebar-link").forEach(l => l.classList.remove("active"));
  document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));

  const targetLink = document.getElementById(`link_${panelId}`);
  if (targetLink) targetLink.classList.add("active");

  const targetPanel = document.getElementById(`panel_${panelId}`);
  if (targetPanel) {
    targetPanel.classList.add("active");
    loadPanelData(panelId);
  }

  // Update header text based on page tab
  const headers = {
    student_courses: { title: "My Workspace", sub: "Review your enrolled technical cohort tracks." },
    explore_courses: { title: "Explore Catalog", sub: "Register for active academy classes and roadmaps." },
    student_live_classes: { title: "Upcoming Live Classes", sub: "Join active mentor screen shares and reviews." },
    student_profile: { title: "Profile Management", sub: "Update your system profile details." },
    admin_courses: { title: "Manage Courses", sub: "Configure and update EduTech catalog pricing models." },
    admin_enrollments: { title: "Track Enrollments", sub: "Inspect cohort enrollments and statistics." },
    admin_live: { title: "Live Cohort Classes", sub: "Manage and broadcast platform screen-share sessions." },
    admin_employees: { title: "Manage Staff/Trainers", sub: "Register and manage academy staff profiles." },
    admin_designations: { title: "Designations Registry", sub: "Configure custom designation roles for employees." }
  };

  if (headers[panelId]) {
    document.getElementById("dashTitle").textContent = headers[panelId].title;
    document.getElementById("dashSub").textContent = headers[panelId].sub;
  }
}

// Side menu composition
function renderSidebar() {
  const sidebar = document.getElementById("sidebarMenu");
  sidebar.innerHTML = "";
  
  let tabs = [];
  if (user.role === 'admin') {
    tabs = [
      { id: "admin_courses", label: "Manage Courses", icon: "book-open" },
      { id: "admin_enrollments", label: "Enrollments Manager", icon: "users" },
      { id: "admin_live", label: "Live Classes Mgmt", icon: "video" },
      { id: "admin_employees", label: "Manage Staff/Trainers", icon: "users-2" },
      { id: "admin_designations", label: "Designations Registry", icon: "briefcase" },
      { id: "student_profile", label: "My Profile", icon: "user" }
    ];
  } else if (user.role === 'employee') {
    tabs = [
      { id: "admin_courses", label: "Manage Courses", icon: "book-open" },
      { id: "admin_enrollments", label: "Enrollments Manager", icon: "users" },
      { id: "admin_live", label: "Live Classes Mgmt", icon: "video" },
      { id: "student_profile", label: "My Profile", icon: "user" }
    ];
  } else {
    tabs = [
      { id: "student_courses", label: "My Enrolled Courses", icon: "graduation-cap" },
      { id: "explore_courses", label: "Explore Programs", icon: "compass" },
      { id: "student_live_classes", label: "Upcoming Live Classes", icon: "video" },
      { id: "student_profile", label: "My Profile", icon: "user" }
    ];
  }

  tabs.forEach(tab => {
    const a = document.createElement("a");
    a.id = `link_${tab.id}`;
    a.className = "sidebar-link";
    a.innerHTML = `<i data-lucide="${tab.icon}" class="sidebar-icon"></i><span>${tab.label}</span>`;
    a.onclick = () => switchTab(tab.id);
    sidebar.appendChild(a);
  });

  if (window.lucide) {
    lucide.createIcons();
  }

  if (tabs.length > 0) {
    switchTab(tabs[0].id);
  }
}

// Dynamic Panel Controllers loader
function loadPanelData(panelId) {
  if (panelId === "student_courses") loadStudentCourses();
  else if (panelId === "explore_courses") loadExploreCourses();
  else if (panelId === "student_live_classes") loadStudentLiveClasses();
  else if (panelId === "student_profile") loadProfileData();
  else if (panelId === "admin_courses") loadAdminCourses();
  else if (panelId === "admin_enrollments") loadAdminEnrollments();
  else if (panelId === "admin_live") loadAdminLive();
  else if (panelId === "admin_employees") loadAdminEmployees();
  else if (panelId === "admin_designations") loadAdminDesignations();
}

async function loadExploreCourses() {
  const grid = document.getElementById("exploreCoursesGrid");
  grid.innerHTML = "<p>Loading active program catalog...</p>";
  
  try {
    const courses = await apiCall("/api/edutech/courses");

    const enrolledIds = enrolled.map(e => e.id);
 
    if (!courses.length) {
      grid.innerHTML = "<p style='color:var(--muted);'>No active programs found in catalog.</p>";
      return;
    }
 
    grid.innerHTML = courses.map(c => {
      const isEnrolled = enrolledIds.includes(c.id);
      return `
        <div class="course-card">
          <div class="course-header">
            <div class="course-icon-box">
              <i data-lucide="${getIconName(c.icon)}" style="width:20px;height:20px;"></i>
            </div>
            <span class="badge ${c.level.toLowerCase()}">${c.level}</span>
          </div>
          <div>
            <h3 class="course-title">${c.title}</h3>
            <div class="course-meta">
              <span><i data-lucide="clock" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>${c.duration}</span>
              <span><i data-lucide="star" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;color:#facc15;"></i>${c.rating}</span>
            </div>
          </div>
          <div class="course-footer">
            <div>
              <span class="course-price">${formatRupee(c.price)}</span>
              ${c.old_price ? `<span class="course-price-old">${formatRupee(c.old_price)}</span>` : ''}
            </div>
            ${isEnrolled 
              ? `<button class="btn-ghost" style="padding:6px 12px; font-size:12px; color:var(--success); border-color:rgba(34,197,94,0.3)" disabled>✓ Enrolled</button>`

    lucide.createIcons();
  } catch (err) {
    grid.innerHTML = "<p style='color:#ef4444;'>Failed to load program catalog.</p>";
  }
}

async function saveProfile(e) {
  e.preventDefault();
  const name = document.getElementById("profName").value.strip ? document.getElementById("profName").value.strip() : document.getElementById("profName").value;
  const password = document.getElementById("profPassword").value;
  
  const payload = { name };
  if (password) payload.password = password;

  try {
    const res = await apiCall("/auth/profile", "PUT", payload);
    alert("Profile settings saved successfully!");
    
    // Update local storage representation
    user.name = name;
    localStorage.setItem("edutech_user", JSON.stringify(user));
    document.getElementById("userGreeting").textContent = `Hello, ${user.name} (${user.role.toUpperCase()})`;
    document.getElementById("profPassword").value = "";
  } catch(e) {}
}

function showAddCourseModal() {
  document.getElementById("courseModalTitle").textContent = "Add New Course";
  document.getElementById("courseId").value = "";
  document.getElementById("courseTitle").value = "";
  document.getElementById("courseLevel").value = "Beginner";
  document.getElementById("courseDuration").value = "";
  document.getElementById("coursePrice").value = "";
  document.getElementById("courseOldPrice").value = "";
  document.getElementById("courseIcon").value = "layers";
  document.getElementById("courseActiveField").style.display = "none";
  openModal("courseModal");
}

function editCourseModal(course) {
  document.getElementById("courseModalTitle").textContent = "Edit Program Details";
  document.getElementById("courseId").value = course.id;
  document.getElementById("courseTitle").value = course.title;
  document.getElementById("courseLevel").value = course.level;
  document.getElementById("courseDuration").value = course.duration;
  document.getElementById("coursePrice").value = course.price;
  document.getElementById("courseOldPrice").value = course.old_price || "";
  document.getElementById("courseIcon").value = course.icon;
  document.getElementById("courseActive").checked = course.is_active;
  document.getElementById("courseActiveField").style.display = "flex";
  openModal("courseModal");
}

document.getElementById("courseForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const id = document.getElementById("courseId").value;
  const title = document.getElementById("courseTitle").value;
  const level = document.getElementById("courseLevel").value;
  const duration = document.getElementById("courseDuration").value;
  const price = Number(document.getElementById("coursePrice").value);
  const oldPriceVal = document.getElementById("courseOldPrice").value;
  const old_price = oldPriceVal ? Number(oldPriceVal) : null;
  const icon = document.getElementById("courseIcon").value;
  const is_active = document.getElementById("courseActive").checked;

  const payload = { title, level, duration, price, old_price, icon, is_active };
  
  try {
    if (id) {
      await apiCall(`/api/edutech/courses/${id}`, "PUT", payload);
      alert("Course updated successfully!");
    } else {
      await apiCall("/api/edutech/courses", "POST", payload);
      alert("New course added to catalog!");
    }
    closeModal("courseModal");
    loadAdminCourses();
  } catch(e) {}
});

async function deleteCourse(id) {
  if (confirm("Are you sure you want to permanently delete this course? Warning: This will delete associated enrollments.")) {
    try {
      await apiCall(`/api/edutech/courses/${id}`, "DELETE");
      alert("Course deleted successfully!");
      loadAdminCourses();
    } catch(e) {}
  }
}

    tbody.innerHTML = list.map(c => `
      <tr>
        <td style="font-weight:600;color:white;">${c.course_title}</td>
        <td>${c.title}</td>
        <td><span style="color:#0096ff;font-weight:500;">${c.platform}</span></td>
        <td>${formatDate(c.scheduled_at)}</td>
        <td>
          <button class="btn-danger" onclick="cancelLiveClass(${c.id})">Cancel</button>
        </td>
      </tr>
    `).join("");
  } catch(e) {
    tbody.innerHTML = "<tr><td colspan='5' style='color:#ef4444;'>Failed to load live sessions.</td></tr>";
  }
}

async function submitLiveClass(e) {
  e.preventDefault();
  const course_id = Number(document.getElementById("liveCourseSelect").value);
  const title = document.getElementById("liveTitle").value;
  const platform = document.getElementById("livePlatform").value;
  const meeting_link = document.getElementById("liveLink").value;
  const scheduled_at = document.getElementById("liveTime").value;

  const payload = { course_id, title, platform, meeting_link, scheduled_at };

  try {
    await apiCall("/api/edutech/live-classes", "POST", payload);
    alert("Live class scheduled successfully!");
    
    // Reset form
    document.getElementById("liveTitle").value = "";
    document.getElementById("liveLink").value = "";
    document.getElementById("liveTime").value = "";
    
    loadAdminLiveClassesList();
  } catch(e) {}
}

async function cancelLiveClass(id) {
  if (confirm("Are you sure you want to cancel and remove this scheduled live class session?")) {
    try {
      await apiCall(`/api/edutech/live-classes/${id}`, "DELETE");
      alert("Live class screening session cancelled.");
      loadAdminLiveClassesList();
    } catch(e) {}
  }
}


// ==================== HELPER METHODS ====================

function getIconName(cat) {
  const map = {
    layers: 'layers',
    code: 'code-2',
    coffee: 'coffee',
    brain: 'brain',
    chart: 'bar-chart',
    cloud: 'cloud',
    server: 'server',
    shield: 'shield',
    palette: 'palette'
  };
  return map[cat] || 'layers';
}

function formatDate(isoStr) {
  if (!isoStr) return "-";
  try {
    const d = new Date(isoStr);
    return d.toLocaleString("en-IN", {
      dateStyle: "medium",
      timeStyle: "short"
    });
  } catch(e) {
    return isoStr;
  }
}

// 8. ADMIN VIEW: Manage staff (CRUD)
let cachedEmployeesList = [];

async function loadAdminEmployees() {
  const tbody = document.getElementById("adminEmployeesTableBody");
  tbody.innerHTML = "<tr><td colspan='7'>Loading staff details...</td></tr>";
  
  try {
    const list = await apiCall("/employees?portal=edutech");
    cachedEmployeesList = list;
    renderEmployeesTable(list);
  } catch (err) {
    tbody.innerHTML = "<tr><td colspan='7' style='color:#ef4444;'>Failed to load employees.</td></tr>";
  }
}

function renderEmployeesTable(list) {
  const tbody = document.getElementById("adminEmployeesTableBody");
  if (!list.length) {
    tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;color:var(--muted);'>No employees found.</td></tr>";
    return;
  }
  tbody.innerHTML = list.map(e => `
    <tr>
      <td style="font-weight:600;color:white;">${e.employee_id}</td>
      <td style="font-weight:600;">${e.name}</td>
      <td>${e.email}</td>
      <td>${e.department || '-'}</td>
      <td><span style="color:#ff7a00;font-weight:500;">${e.designation || '-'}</span></td>
      <td><span class="badge ${e.status.toLowerCase() === 'active' ? 'active' : 'pending'}">${e.status}</span></td>
      <td>
        <button class="btn-ghost" style="padding:4px 8px; font-size:11px;" onclick="showEditEmployeeModal(${JSON.stringify(e).replace(/"/g, '&quot;')})">Edit</button>
      </td>
    </tr>
  `).join("");
}

function filterAdminEmployees() {
  const q = document.getElementById("empSearch").value.toLowerCase().trim();
  if (!q) {
    renderEmployeesTable(cachedEmployeesList);
    return;
  }
  const filtered = cachedEmployeesList.filter(e => 
    e.name.toLowerCase().includes(q) || 
    e.employee_id.toLowerCase().includes(q) ||
    (e.department && e.department.toLowerCase().includes(q)) ||
    (e.designation && e.designation.toLowerCase().includes(q))
  );
  renderEmployeesTable(filtered);
}

async function populateDesignationsDropdown(targetSelectId, selectedValue = "") {
  const select = document.getElementById(targetSelectId);
  select.innerHTML = "<option value=''>-- Loading Designations --</option>";
  try {
    const list = await apiCall("/designations");
    select.innerHTML = "<option value=''>-- Select Designation --</option>" + 
      list.map(d => `<option value="${d.name}" ${d.name === selectedValue ? 'selected' : ''}>${d.name}</option>`).join("");
  } catch(e) {
    select.innerHTML = "<option value=''>-- Error Loading --</option>";
  }
}

async function showAddEmployeeModal() {
  document.getElementById("employeeModalTitle").textContent = "Register New Employee";
  document.getElementById("empId").value = "";
  document.getElementById("empCorpId").value = "";
  document.getElementById("empCorpId").disabled = false;
  document.getElementById("empName").value = "";
  document.getElementById("empEmail").value = "";
  document.getElementById("empEmail").disabled = false;
  document.getElementById("empPassword").value = "";
  document.getElementById("empPassword").placeholder = "Auto-generated if blank";
  document.getElementById("empPhone").value = "";
  document.getElementById("empDept").value = "Academy";
  document.getElementById("empJoinDate").value = new Date().toISOString().split('T')[0];
  document.getElementById("empStatusField").style.display = "none";
  
  await populateDesignationsDropdown("empDesg");
  openModal("employeeModal");
}

async function showEditEmployeeModal(emp) {
  document.getElementById("employeeModalTitle").textContent = "Edit Employee Details";
  document.getElementById("empId").value = emp.id;
  document.getElementById("empCorpId").value = emp.employee_id;
  document.getElementById("empCorpId").disabled = true;
  document.getElementById("empName").value = emp.name;
  document.getElementById("empEmail").value = emp.email;
  document.getElementById("empEmail").disabled = true;
  document.getElementById("empPassword").value = "";
  document.getElementById("empPassword").placeholder = "Leave blank to keep current";
  document.getElementById("empPhone").value = emp.phone_number || "";
  document.getElementById("empDept").value = emp.department || "";
  document.getElementById("empJoinDate").value = emp.date_of_joining ? emp.date_of_joining.split('T')[0] : "";
  document.getElementById("empStatus").value = emp.status || "Active";
  document.getElementById("empStatusField").style.display = "block";
  
  await populateDesignationsDropdown("empDesg", emp.designation);
  openModal("employeeModal");
}

async function submitEmployee(e) {
  e.preventDefault();
  const id = document.getElementById("empId").value;
  const employee_id = document.getElementById("empCorpId").value;
  const name = document.getElementById("empName").value.trim();
  const email = document.getElementById("empEmail").value.trim();
  const password = document.getElementById("empPassword").value;
  const phone_number = document.getElementById("empPhone").value.trim();
  const department = document.getElementById("empDept").value.trim();
  const designation = document.getElementById("empDesg").value;
  const date_of_joining = document.getElementById("empJoinDate").value;
  const status = document.getElementById("empStatus").value;

  if (!designation) {
    alert("Please select a designation.");
    return;
  }

  const payload = { name, phone_number, department, designation, date_of_joining, status, portal: "edutech" };
  if (password) payload.password = password;

  try {
    if (id) {
      await apiCall(`/employees/${id}`, "PUT", payload);
      alert("Employee details updated successfully!");
    } else {
      payload.employee_id = employee_id;
      payload.email = email;
      const res = await apiCall("/employees", "POST", payload);
      alert(res.message || "Employee registered successfully!");
    }
    closeModal("employeeModal");
    loadAdminEmployees();
  } catch(e) {}
}
