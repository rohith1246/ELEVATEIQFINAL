<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — EduTech Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="shortcut icon" href="logo.png" type="image/png">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="alert-override.js"></script>
<style>
  :root {
    --primary: #ff7a00;
    --secondary: #0096ff;
    --accent: #ff8a00;
    --success: #22C55E;
    --bg: #020617;
    --bg-soft: #050b1f;
    --card: rgba(15, 23, 36, 0.6);
    --card-hover: rgba(20, 35, 60, 0.8);
    --text: #F8FAFC;
    --muted: #94A3B8;
    --line: rgba(148, 163, 184, 0.12);
    --glass-border: rgba(255, 255, 255, 0.08);
    --orange-glow: rgba(255, 122, 0, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Backdrop gradient effects */
  .bg-canvas {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, var(--bg-soft) 0%, var(--bg) 100%);
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.1;
  }
  .orb1 { top: -10%; left: -10%; width: 45%; height: 45%; background: var(--primary); }
  .orb2 { bottom: -10%; right: -10%; width: 50%; height: 50%; background: var(--secondary); }

  /* Navigation */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(2, 6, 23, 0.6);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    text-decoration: none;
  }
  .logo img {
    height: 28px;
    width: auto;
    object-fit: contain;
  }
  .logo span {
    font-size: 8px;
    color: #3FD0FF;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .user-greeting {
    font-size: 13.5px;
    color: var(--muted);
  }
  .btn-logout {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.02);
    color: var(--text);
    transition: all 0.3s ease;
  }
  .btn-logout:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.4);
    color: #f87171;
  }

  /* Dashboard Container */
  .dash-container {
    flex: 1;
    display: flex;
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
    padding: 30px;
    gap: 30px;
  }

  /* Sidebar styling */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: fit-content;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .sidebar-link:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.04);
  }
  .sidebar-link.active {
    color: white;
    background: linear-gradient(135deg, rgba(255, 122, 0, 0.18), rgba(0, 150, 255, 0.15));
    border: 1px solid rgba(255, 122, 0, 0.2);
    box-shadow: 0 4px 15px -4px var(--orange-glow);
  }
  .sidebar-icon {
    width: 18px;
    height: 18px;
  }

  /* Content Workspace */
  .dash-content {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .dash-header {
    margin-bottom: 24px;
  }
  .dash-header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .dash-header p {
    color: var(--muted);
    font-size: 13.5px;
  }

  /* Dynamic panels */
  .section-panel {
    display: none;
    animation: fadeIn 0.4s ease forwards;
  }
  .section-panel.active {
    display: block;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Components: Glass Card */
  .glass-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  /* Tables */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: rgba(15, 23, 36, 0.3);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 13.5px;
  }
  th {
    background: rgba(255, 255, 255, 0.02);
    padding: 14px 16px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    color: var(--text);
  }
  tr:last-child td {
    border-bottom: none;
  }
  tr:hover td {
    background: rgba(255, 255, 255, 0.01);
  }

  /* Badges */
  .badge {
    display: inline-flex;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge.beginner { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
  .badge.intermediate { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
  .badge.advanced { background: rgba(168, 85, 247, 0.1); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.2); }
  .badge.active { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
  .badge.pending { background: rgba(234, 179, 8, 0.1); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.2); }

  /* Course Card Grid */
  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .course-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s ease;
  }
  .course-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255, 122, 0, 0.25);
    background: var(--card-hover);
    box-shadow: 0 10px 30px -10px var(--orange-glow);
  }
  .course-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .course-icon-box {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(255, 122, 0, 0.1);
    border: 1px solid rgba(255, 122, 0, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
  }
  .course-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 8px;
    color: white;
  }
  .course-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
  }
  .course-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 10px;
  }
  .course-price {
    font-size: 18px;
    font-weight: 700;
    color: white;
  }
  .course-price-old {
    font-size: 13px;
    text-decoration: line-through;
    color: var(--muted);
    margin-left: 6px;
  }

  /* Form Elements */
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .field select option {
    background: #0f172a;
    color: #ffffff;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--secondary);
    background: rgba(255, 255, 255, 0.05);
  }
  .field select option {
    background: #0b1528;
    color: white;
  }

  /* Buttons */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    font-weight: 600;
    border-radius: 10px;
    font-size: 13.5px;
    box-shadow: 0 4px 12px rgba(0, 150, 255, 0.25);
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    opacity: 0.95;
  }
  .btn-ghost {
    padding: 10px 20px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.01);
    color: var(--text);
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-ghost:hover {
    border-color: var(--muted);
    background: rgba(255, 255, 255, 0.03);
  }
  .btn-danger {
    padding: 6px 12px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #f87171;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .btn-danger:hover {
    background: rgba(239, 68, 68, 0.2);
  }

  /* Grid details stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 20px;
  }
  .stat-card h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-card .val {
    font-size: 24px;
    font-weight: 700;
    color: white;
  }

  /* Modals */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(2, 6, 23, 0.85);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal.open {
    display: flex;
  }
  .modal-content {
    background: #0b1220;
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    padding: 30px;
    position: relative;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5);
  }
  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 22px;
    color: var(--muted);
    cursor: pointer;
  }
  .modal-close:hover {
    color: white;
  }

  /* ==========================================================================
     RESPONSIVE DESIGN MEDIA QUERIES (ADMIN DASHBOARD)
     ========================================================================== */
  @media (max-width: 992px) {
    nav {
      padding: 12px 24px;
    }
    .dash-container {
      padding: 16px;
      gap: 16px;
    }
    .sidebar {
      width: 240px;
    }
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .dash-container {
      flex-direction: column;
      margin-top: 70px;
    }
    .sidebar {
      width: 100%;
      flex-direction: row;
      overflow-x: auto;
      padding: 12px 16px;
      border-radius: 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar {
      display: none;
    }
    .profile-box {
      display: none;
    }
    .sidebar-link {
      flex: 0 0 auto;
      padding: 8px 16px;
    }
    
    .dash-header-row {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
    
    .form-grid {
      grid-template-columns: 1fr;
    }
    
    /* Table Responsive wrapper */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
  }

  @media (max-width: 480px) {
    .nav-right .btn-logout {
      display: none;
    }
    .dash-header h1 {
      font-size: 20px;
    }
    .modal-content {
      padding: 20px;
    }
  }
</style>
</head>

</div>

<div class="dash-container">

    </div>

<!-- ==================== POPUP MODALS ==================== -->

<!-- Add/Edit Course Modal -->
<div class="modal" id="courseModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal('courseModal')">&times;</span>
    <h2 id="courseModalTitle" style="margin-bottom: 20px;">Add New Course</h2>
    <form id="courseForm">
      <input type="hidden" id="courseId">
      <div class="field">
        <label>Course Title</label>
        <input type="text" id="courseTitle" placeholder="e.g. Kotlin Mobile App Dev" required>
      </div>
      <div class="field">
        <label>Difficulty Level</label>
        <select id="courseLevel" required>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
      <div class="field">
        <label>Duration (weeks/hours)</label>
        <input type="text" id="courseDuration" placeholder="e.g. 14 weeks" required>
      </div>
      <div class="field">
        <label>Price (₹)</label>
        <input type="number" id="coursePrice" placeholder="e.g. 35000" required>
      </div>
      <div class="field">
        <label>Old Price (₹, optional)</label>
        <input type="number" id="courseOldPrice" placeholder="e.g. 42000">
      </div>
      <div class="field">
        <label>Theme Icon Category</label>
        <select id="courseIcon">
          <option value="layers">Layers (Default)</option>
          <option value="code">Code Editor</option>
          <option value="coffee">Coffee (Java/Backend)</option>
          <option value="brain">Brain (AI/ML)</option>
          <option value="chart">Chart (Data Science)</option>
          <option value="cloud">Cloud (DevOps)</option>
          <option value="server">Server (Database)</option>
          <option value="shield">Shield (Security)</option>
          <option value="palette">Palette (UI/UX)</option>
        </select>
      </div>
      <div class="field" id="courseActiveField" style="display:none; flex-direction:row; align-items:center; gap:8px;">
        <input type="checkbox" id="courseActive" style="width:auto; cursor:pointer;" checked>
        <label for="courseActive" style="margin-bottom:0; cursor:pointer;">Course is Active</label>
      </div>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button type="button" class="btn-ghost" onclick="closeModal('courseModal')" style="flex:1;">Cancel</button>
        <button type="submit" class="btn-primary" style="flex:1;">Save Course</button>
      </div>
    </form>
  </div>
</div>

<!-- Add/Edit Employee Modal -->
<div class="modal" id="employeeModal">
  <div class="modal-content" style="max-width: 600px;">
    <span class="modal-close" onclick="closeModal('employeeModal')">&times;</span>
    <h2 id="employeeModalTitle" style="margin-bottom: 20px;">Register New Employee</h2>
    <form id="employeeForm" onsubmit="submitEmployee(event)">
      <input type="hidden" id="empId">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div class="field">
          <label>Employee ID</label>
          <input type="text" id="empCorpId" placeholder="e.g. EMP001" required>
        </div>
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="empName" placeholder="e.g. Robert Martin" required>
        </div>
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="empEmail" placeholder="e.g. unclebob@example.com" required>
        </div>
        <div class="field">
          <label>Password (optional for new)</label>
          <input type="password" id="empPassword" placeholder="Auto-generated if blank">
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="text" id="empPhone" placeholder="e.g. +91 9999999999">
        </div>
        <div class="field">
          <label>Department</label>
          <input type="text" id="empDept" placeholder="e.g. Academy" required>
        </div>
        <div class="field">
          <label>Designation</label>
          <select id="empDesg" required>
            <!-- Loaded dynamically from designations -->
          </select>
        </div>
        <div class="field">
          <label>Date of Joining</label>
          <input type="date" id="empJoinDate">
        </div>
      </div>
      <div class="field" id="empStatusField" style="display:none; margin-bottom:10px;">
        <label>Employee Status</label>
        <select id="empStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button type="button" class="btn-ghost" onclick="closeModal('employeeModal')" style="flex:1;">Cancel</button>
        <button type="submit" class="btn-primary" style="flex:1;">Save Employee</button>
      </div>
    </form>
  </div>
</div>

<!-- ==================== JAVASCRIPT LOGIC ==================== -->
<script>
// Check Authentication session state
const API_BASE = window.location.origin;
const token = localStorage.getItem("edutech_token");
const user = JSON.parse(localStorage.getItem("edutech_user") || "null");

if (!token || !user) {
    window.location.href = "login.html";
}

// Display Name greeting
if (user) {
    document.getElementById("userGreeting").textContent = `Hello, ${user.name} (${(user.role || '').toUpperCase()})`;
}

// Global API Call wrapper
async function apiCall(endpoint, method = "GET", body = null) {
    const activeBtn = document.activeElement;
    const isButton = activeBtn && (activeBtn.tagName === 'BUTTON' || (activeBtn.tagName === 'INPUT' && ['submit', 'button'].includes(activeBtn.type)));
    let originalHtml = "";
    if (isButton && !activeBtn.disabled) {
        activeBtn.disabled = true;
        originalHtml = activeBtn.innerHTML;
        if (!activeBtn.querySelector('.spinner')) {
            activeBtn.innerHTML = `<span class="spinner"></span> ` + (activeBtn.textContent.trim() || 'Loading...');
        }
    }

    try {
        const options = {
            method,
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            }
        };
        if (body) options.body = JSON.stringify(body);
        
        try {
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            let data = null;
            const contentType = res.headers.get("content-type");
            if (contentType && contentType.includes("application/json")) {
                data = await res.json();
            }
            if (!res.ok) {
                const errMsg = (data && data.error) ? data.error : `Request failed with status ${res.status}`;
                throw new Error(errMsg);
            }
            return data;
        } catch (err) {
            alert(err.message);
            throw err;
        }
    } finally {
        if (isButton) {
            activeBtn.disabled = false;
            activeBtn.innerHTML = originalHtml;
        }
    }
}

function logout() {
    localStorage.removeItem("edutech_token");
    localStorage.removeItem("edutech_user");
    window.location.href = "index.html";
}

function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// Vector icon mappings for Lucide rendering
const iconSVGs = {
  layers: '<i data-lucide="layers" class="sidebar-icon"></i>',
  code: '<i data-lucide="code-2" class="sidebar-icon"></i>',
  coffee: '<i data-lucide="coffee" class="sidebar-icon"></i>',
  brain: '<i data-lucide="brain" class="sidebar-icon"></i>',
  chart: '<i data-lucide="bar-chart" class="sidebar-icon"></i>',
  cloud: '<i data-lucide="cloud" class="sidebar-icon"></i>',
  server: '<i data-lucide="server" class="sidebar-icon"></i>',
  shield: '<i data-lucide="shield" class="sidebar-icon"></i>',
  palette: '<i data-lucide="palette" class="sidebar-icon"></i>'

// Switching sidebar tabs controller
function switchTab(panelId) {
  document.querySelectorAll(".sidebar-link").forEach(l => l.classList.remove("active"));
  document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));

  const targetLink = document.getElementById(`link_${panelId}`);
  if (targetLink) targetLink.classList.add("active");

  const targetPanel = document.getElementById(`panel_${panelId}`);
  if (targetPanel) {
    targetPanel.classList.add("active");
    loadPanelData(panelId);
  }

  // Update header text based on page tab
  const headers = {
    student_courses: { title: "My Workspace", sub: "Review your enrolled technical cohort tracks." },
    explore_courses: { title: "Explore Catalog", sub: "Register for active academy classes and roadmaps." },
    student_live_classes: { title: "Upcoming Live Classes", sub: "Join active mentor screen shares and reviews." },

async function loadStudentCourses() {
  const grid = document.getElementById("myCoursesGrid");

  try {
    const list = await apiCall("/api/edutech/my-courses");
    if (!list.length) {
      grid.innerHTML = `
        <div class="glass-card" style="grid-column: 1/-1; text-align:center; padding:40px;">
          <p style="color:var(--muted); margin-bottom: 15px;">You are currently not enrolled in any technical cohorts.</p>
          <button class="btn-primary" onclick="switchTab('explore_courses')">Browse Programs</button>
        </div>`;
      return;
    }
    grid.innerHTML = list.map(c => `
      <div class="course-card">
        <div class="course-header">
          <div class="course-icon-box">
            <i data-lucide="${getIconName(c.icon)}" style="width:20px;height:20px;"></i>
          </div>
          <span class="badge ${c.level.toLowerCase()}">${c.level}</span>
        </div>
        <div>
          <h3 class="course-title">${c.title}</h3>
          <div class="course-meta">

            <span><i data-lucide="star" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;color:#facc15;"></i>${c.rating}</span>

        <div class="course-footer" style="display:flex; justify-content:space-between; align-items:center; width:100%;">
          <div style="font-size:12px; color:var(--muted)">Paid: <strong>${formatRupee(c.price_paid)}</strong></div>
          <div style="display:flex; gap:8px; align-items:center;">
            <a href="invoice.html?enrollment_id=${c.enrollment_id || c.id}" target="_blank" class="btn-ghost" style="padding:4px 8px; font-size:11px; text-decoration:none; display:inline-block; border-color:rgba(0,150,255,0.3); color:var(--secondary)">Invoice</a>

// 2. STUDENT VIEW: Explore Catalog
async function loadExploreCourses() {
  const grid = document.getElementById("exploreCoursesGrid");
  grid.innerHTML = "<p>Loading active program catalog...</p>";
  
  try {
    const courses = await apiCall("/api/edutech/courses");
    const enrolled = await apiCall("/api/edutech/my-courses");
    const enrolledIds = enrolled.map(e => e.id);
 
    if (!courses.length) {
      grid.innerHTML = "<p style='color:var(--muted);'>No active programs found in catalog.</p>";
      return;
    }
 
    grid.innerHTML = courses.map(c => {
      const isEnrolled = enrolledIds.includes(c.id);
      return `
        <div class="course-card">
          <div class="course-header">
            <div class="course-icon-box">
              <i data-lucide="${getIconName(c.icon)}" style="width:20px;height:20px;"></i>
            </div>
            <span class="badge ${c.level.toLowerCase()}">${c.level}</span>
          </div>
          <div>
            <h3 class="course-title">${c.title}</h3>
            <div class="course-meta">
              <span><i data-lucide="clock" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></i>${c.duration}</span>
              <span><i data-lucide="star" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;color:#facc15;"></i>${c.rating}</span>
            </div>
          </div>
          <div class="course-footer">
            <div>
              <span class="course-price">${formatRupee(c.price)}</span>
              ${(c.old_price && Number(c.old_price) > Number(c.price)) ? `<span class="course-price-old">${formatRupee(c.old_price)}</span>` : ''}
            </div>
            ${isEnrolled 
              ? `<button class="btn-ghost" style="padding:6px 12px; font-size:12px; color:var(--success); border-color:rgba(34,197,94,0.3)" disabled>✓ Enrolled</button>`
              : `<button class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="window.location.href='payment.html?course_id=${c.id}'">Enroll Now</button>`
            }
          </div>
        </div>
      `;
    }).join("");
    lucide.createIcons();
  } catch (err) {
    grid.innerHTML = "<p style='color:#ef4444;'>Failed to load program catalog.</p>";
  }
}

// 4. COMMON PROFILE LOAD/SAVE
async function loadProfileData() {
  document.getElementById("profName").value = user.name;
  document.getElementById("profEmail").value = user.email;
}

async function saveProfile(e) {
  e.preventDefault();
  const name = document.getElementById("profName").value.strip ? document.getElementById("profName").value.strip() : document.getElementById("profName").value;
  const password = document.getElementById("profPassword").value;
  
  const payload = { name };
  if (password) payload.password = password;

  try {
    const res = await apiCall("/auth/profile", "PUT", payload);
    alert("Profile settings saved successfully!");
    
    // Update local storage representation
    user.name = name;
    localStorage.setItem("edutech_user", JSON.stringify(user));
    document.getElementById("userGreeting").textContent = `Hello, ${user.name} (${user.role.toUpperCase()})`;
    document.getElementById("profPassword").value = "";
  } catch(e) {}
}

function formatDate(isoStr) {

    });
  } catch(e) {
    return isoStr;
  }
}

// ==================== EDUTECH REALTIME PAYROLL MODULE ====================

let edutechPayrollTickerInterval = null;
let currentEdutechPayrollMonth = new Date().toISOString().substring(0, 7); // YYYY-MM
let cachedEdutechPayrollLedger = [];
let cachedEdutechPayrollSummary = null;

async function loadEdutechPayroll(selectedMonth = null) {
  if (selectedMonth) {
    currentEdutechPayrollMonth = selectedMonth;
  }
  
  const monthInput = document.getElementById("edu_payrollMonthFilter");
  if (monthInput) monthInput.value = currentEdutechPayrollMonth;
  
  try {
    cachedEdutechPayrollSummary = await apiCall(`/api/payroll/summary?month=${currentEdutechPayrollMonth}&portal=edutech`);
    cachedEdutechPayrollLedger = await apiCall(`/api/payroll/ledger?month=${currentEdutechPayrollMonth}&portal=edutech`);
    
    renderEdutechPayrollSummary(cachedEdutechPayrollSummary);
    renderEdutechPayrollLedger(cachedEdutechPayrollLedger);
    startEdutechPayrollTickers(cachedEdutechPayrollSummary, cachedEdutechPayrollLedger);
  } catch (err) {
    console.error("Failed to load Edutech payroll:", err);
  }
}

function renderEdutechPayrollSummary(summary) {
  document.getElementById("edu_stat_pay_cycle").textContent = formatMonthLabel(summary.month);
  document.getElementById("edu_stat_total_pool").textContent = formatCurrency(summary.total_monthly_payroll);
  document.getElementById("edu_stat_burn_rate").textContent = `${formatCurrency(summary.burn_rate_sec)}/sec`;
  document.getElementById("edu_stat_paid_amount").textContent = formatCurrency(summary.paid_amount);
  
  const c = summary.status_counts;
  document.getElementById("edu_stat_paid_count").textContent = c.Paid || 0;
  document.getElementById("edu_stat_proc_count").textContent = c.Processing || 0;
  document.getElementById("edu_stat_pend_count").textContent = c.Pending || 0;
}

function startEdutechPayrollTickers(summary, ledger) {
  if (edutechPayrollTickerInterval) {
    clearInterval(edutechPayrollTickerInterval);
  }
  
  const totalAccruedElem = document.getElementById("edu_stat_total_accrued");
  const burnRate = summary.burn_rate_sec;
  const elapsedSeconds = summary.elapsed_seconds;
  const startTime = Date.now();
  
  const daysInMonth = getDaysInMonthString(summary.month);
  const secsInMonth = daysInMonth * 24 * 3600;
  
  edutechPayrollTickerInterval = setInterval(() => {
    if (!totalAccruedElem || !document.body.contains(totalAccruedElem)) {
      clearInterval(edutechPayrollTickerInterval);
      edutechPayrollTickerInterval = null;
      return;
    }
    const deltaSeconds = (Date.now() - startTime) / 1000;
    const totalElapsed = elapsedSeconds + deltaSeconds;
    
    const cappedElapsed = Math.min(totalElapsed, secsInMonth);
    
    const accruedTotal = cappedElapsed * burnRate;
    totalAccruedElem.innerHTML = `<span class="ticker-prefix">$</span>${accruedTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    
    ledger.forEach(emp => {
      const empTicker = document.getElementById(`edu_emp_ticker_${emp.employee_db_id}`);
      if (empTicker) {
        const empRate = emp.base_salary / secsInMonth;
        const empAccrued = cappedElapsed * empRate;
        empTicker.textContent = formatCurrency(empAccrued, 2);
      }
    });
  }, 1000);
}

function renderEdutechPayrollLedger(ledger) {
  const tbody = document.getElementById("edu_payrollTableBody");
  if (!tbody) return;
  
  if (!ledger.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--muted);">No active staff found.</td></tr>`;
    return;
  }
  
  tbody.innerHTML = ledger.map(emp => {
    const statusClass = emp.status.toLowerCase();
    const actionBtn = emp.status === 'Paid' 
      ? `<button class="btn-ghost" style="padding:4px 8px; font-size:11px;" onclick="viewEdutechPayslipModal(${JSON.stringify(emp).replace(/"/g, '&quot;')})">Payslip</button>`
      : `<button class="btn-primary" style="padding:4px 8px; font-size:11px; margin-top:0;" onclick="openEdutechPayModal(${JSON.stringify(emp).replace(/"/g, '&quot;')})">Process</button>
         <button class="btn-ghost" style="padding:4px 8px; font-size:11px; margin-left:5px;" onclick="viewEdutechPayslipModal(${JSON.stringify(emp).replace(/"/g, '&quot;')})">Preview</button>`;
         
    return `
      <tr>
        <td style="font-weight:600; color:white;">${emp.employee_id}</td>
        <td>
          <div style="font-weight:600; color:white;">${emp.name}</div>
          <div style="font-size:10px; color:var(--muted);">${emp.designation || '-'}</div>
        </td>
        <td>${emp.department || '-'}</td>
        <td style="font-weight:600;">${formatCurrency(emp.base_salary)}</td>
        <td id="edu_emp_ticker_${emp.employee_db_id}" style="font-family:monospace; color:var(--orange); font-weight:600;">$0.0000</td>
        <td><span class="badge ${statusClass === 'paid' ? 'active' : 'pending'}">${emp.status}</span></td>
        <td>${actionBtn}</td>
      </tr>
    `;
  }).join("");
}

let selectedEdutechEmployeePay = null;
function openEdutechPayModal(emp) {
  selectedEdutechEmployeePay = emp;
  
  document.getElementById("edu_calcEmpName").textContent = emp.name;
  document.getElementById("edu_calcEmpId").textContent = emp.employee_id;
  document.getElementById("edu_calcBaseSalary").value = emp.base_salary;
  
  let calc = emp.calc_details || {};
  document.getElementById("edu_calcHra").value = (calc.hra || (emp.base_salary * 0.10)).toFixed(2);
  document.getElementById("edu_calcDa").value = (calc.da || (emp.base_salary * 0.05)).toFixed(2);
  document.getElementById("edu_calcMedical").value = (calc.flat || 1250.00).toFixed(2);
  document.getElementById("edu_calcBonus").value = "0.00";
  
  document.getElementById("edu_calcPf").value = (calc.pf || (emp.base_salary * 0.12)).toFixed(2);
  document.getElementById("edu_calcPt").value = (calc.pt || (emp.base_salary * 0.02)).toFixed(2);
  
  const absentDays = emp.absent_days_count || 0;
  const daysInMonth = getDaysInMonthString(currentEdutechPayrollMonth);
  const calculatedLop = absentDays * (emp.base_salary / daysInMonth);
  document.getElementById("edu_calcAbsentDays").textContent = `${absentDays} day(s) absent`;
  document.getElementById("edu_calcLop").value = calculatedLop.toFixed(2);
  document.getElementById("edu_calcCustomDeduction").value = "0.00";
  
  document.getElementById("edu_calcStatus").value = emp.status === 'Pending' ? 'Processing' : emp.status;
  
  updateEdutechCalculatorTotals();
  openModal("edu_processPayrollModal");
}

function updateEdutechCalculatorTotals() {
  const base = parseFloat(document.getElementById("edu_calcBaseSalary").value) || 0.0;
  
  const hra = parseFloat(document.getElementById("edu_calcHra").value) || 0.0;
  const da = parseFloat(document.getElementById("edu_calcDa").value) || 0.0;
  const med = parseFloat(document.getElementById("edu_calcMedical").value) || 0.0;
  const bonus = parseFloat(document.getElementById("edu_calcBonus").value) || 0.0;
  const totalAllowances = hra + da + med + bonus;
  
  const pf = parseFloat(document.getElementById("edu_calcPf").value) || 0.0;
  const pt = parseFloat(document.getElementById("edu_calcPt").value) || 0.0;
  const lop = parseFloat(document.getElementById("edu_calcLop").value) || 0.0;
  const customDed = parseFloat(document.getElementById("edu_calcCustomDeduction").value) || 0.0;
  const totalDeductions = pf + pt + lop + customDed;
  
  const netPay = base + totalAllowances - totalDeductions;
  
  document.getElementById("edu_calcTotalAllowances").textContent = formatCurrency(totalAllowances);
  document.getElementById("edu_calcTotalDeductions").textContent = formatCurrency(totalDeductions);
  document.getElementById("edu_calcNetPay").textContent = formatCurrency(netPay);
  document.getElementById("edu_calcNetPayRaw").value = netPay.toFixed(2);
}

async function submitEdutechPayroll(event) {
  if (event) event.preventDefault();
  if (!selectedEdutechEmployeePay) return;
  
  const base = parseFloat(document.getElementById("edu_calcBaseSalary").value) || 0.0;
  const hra = parseFloat(document.getElementById("edu_calcHra").value) || 0.0;
  const da = parseFloat(document.getElementById("edu_calcDa").value) || 0.0;
  const med = parseFloat(document.getElementById("edu_calcMedical").value) || 0.0;
  const bonus = parseFloat(document.getElementById("edu_calcBonus").value) || 0.0;

  const pf = parseFloat(document.getElementById("edu_calcPf").value) || 0.0;
  const pt = parseFloat(document.getElementById("edu_calcPt").value) || 0.0;
  const lop = parseFloat(document.getElementById("edu_calcLop").value) || 0.0;
  const customDed = parseFloat(document.getElementById("edu_calcCustomDeduction").value) || 0.0;
  const totalDeductions = pf + pt + lop + customDed;
  
  const netPay = parseFloat(document.getElementById("edu_calcNetPayRaw").value) || 0.0;
  const status = document.getElementById("edu_calcStatus").value;
  
  try {
    const res = await apiCall("/api/payroll/process", "POST", {
      employee_db_id: selectedEdutechEmployeePay.employee_db_id,
      month: currentEdutechPayrollMonth,
      base_salary: base,
      allowances: totalAllowances,
      deductions: totalDeductions,
      net_pay: netPay,
      status: status
    });
    
    alert(res.message || "Payroll processed successfully!");

    loadEdutechPayroll(currentEdutechPayrollMonth);
  } catch(err) {
    console.error("Failed to save Edutech payroll run:", err);

function formatMonthLabel(monthStr) {
  if (!monthStr) return "";
  const parts = monthStr.split("-");
  const dateObj = new Date(parts[0], parts[1] - 1, 1);
  return dateObj.toLocaleDateString("en-US", { month: "long", year: "numeric" });
}

function formatCurrency(val, decimals = 2) {
  if (val === undefined || val === null) val = 0;
  return "$" + parseFloat(val).toLocaleString("en-US", { 
    minimumFractionDigits: decimals, 
    maximumFractionDigits: decimals 
  });
}

function getDaysInMonthString(monthStr) {
  try {
    const parts = monthStr.split("-");
    return new Date(parts[0], parts[1], 0).getDate();
  } catch(e) {
    return 30;
  }
}

function escapeHTML(str) {
  if (!str) return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

async function loadAdminStudentLeaves() {
  const tbody = document.getElementById("adminStudentLeavesTableBody");
  tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Loading student leave records...</td></tr>";
  try {
    const list = await apiCall("/api/edutech/trainer/leaves");
    if (!list.length) {
      tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; color:var(--muted);'>No student leave applications registered.</td></tr>";
      return;
    }
    tbody.innerHTML = list.map(l => {
      const leaveDays = Math.ceil((new Date(l.end_date) - new Date(l.start_date)) / (1000 * 60 * 60 * 24)) + 1;
      const start = new Date(l.start_date).toLocaleDateString("en-IN", {dateStyle: "medium"});
      const end = new Date(l.end_date).toLocaleDateString("en-IN", {dateStyle: "medium"});
      const reviewer = l.approved_by_name || "-";
      
      let actionBtn = "";
      if (l.status === "Pending") {
        actionBtn = `
          <button onclick="reviewStudentLeave(${l.id}, 'Approved')" class="btn-primary" style="padding:4px 8px; font-size:11px; background:var(--success); box-shadow:none;">Approve</button>

        `;
      } else {
        actionBtn = `<span style="font-size:12px; color:var(--muted);">${reviewer}</span>`;
      }
      
      return `
        <tr>
          <td><strong>${escapeHTML(l.student_name)}</strong></td>
          <td>${escapeHTML(l.student_email)}</td>
          <td>${l.leave_type}</td>

            <div style="font-weight:600; color:white;">${leaveDays} Days</div>

          <td><span class="badge ${l.status.toLowerCase()}">${l.status}</span></td>

  } catch (err) {

    await apiCall("/api/tickets", "POST", { title, category, priority, description });
    alert("Support ticket submitted successfully!");
    document.getElementById("createTicketForm").reset();
    loadUserTickets();
  } catch(err) {
    alert("Failed to submit ticket: " + err.message);
  }
}

let activeResolveTicket = null;
function openResolveTicketModal(ticket) {
  activeResolveTicket = ticket;
  document.getElementById("resolveTicketId").value = ticket.id;
  document.getElementById("resolveTicketSubject").textContent = ticket.title;
  document.getElementById("resolveTicketDesc").textContent = ticket.description;
  document.getElementById("resolveTicketNotes").value = ticket.admin_notes || "";
  document.getElementById("resolveTicketStatus").value = "Resolved";
  openModal("resolveTicketModal");
}

async function submitResolveTicket(e) {
  e.preventDefault();
  const id = document.getElementById("resolveTicketId").value;
  const status = document.getElementById("resolveTicketStatus").value;
  const admin_notes = document.getElementById("resolveTicketNotes").value.trim();
  
  try {
    await apiCall(`/api/tickets/${id}`, "PUT", { status, admin_notes });
    alert("Ticket resolution saved successfully.");
    closeModal("resolveTicketModal");
    loadAdminTickets();
  } catch(err) {
    alert("Failed to resolve ticket: " + err.message);
  }
}

// Trigger initial rendering
renderSidebar();
</script>
