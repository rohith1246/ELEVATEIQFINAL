<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — EduTech Academy</title>
<link rel="shortcut icon" href="logo.png" type="image/png">
<style>
  :root {
    --primary: #ff7a00;
    --secondary: #0096ff;
    --accent: #ff8a00;
    --success: #22C55E;
    --bg: #020617;
    --bg-soft: #050b1f;
    --card: rgba(15, 23, 36, 0.7);
    --card-hover: #122034;
    --text: #F8FAFC;
    --muted: #94A3B8;
    --line: rgba(148, 163, 184, 0.12);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Background Ambient Orbs */
  .bg-canvas {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    overflow: hidden;
    background: radial-gradient(circle at 50% 50%, var(--bg-soft) 0%, var(--bg) 100%);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
  }
  .orb1 { top: -10%; left: -10%; width: 45%; height: 45%; background: var(--primary); }
  .orb2 { bottom: -10%; right: -10%; width: 50%; height: 50%; background: var(--secondary); }
  .orb3 { top: 40%; left: 60%; width: 35%; height: 35%; background: var(--accent); }

  /* Navigation Header */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(2, 6, 23, 0.5);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    text-decoration: none;
  }
  .logo img {
    height: 32px;
    width: auto;
    object-fit: contain;
  }
  .logo span {
    font-size: 9px;
    color: #3FD0FF;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .nav-btn {
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--line);
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.02);
  }
  .nav-btn:hover {
    border-color: var(--secondary);
    background: rgba(0, 150, 255, 0.1);
  }

  /* Form Container */
  .auth-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    z-index: 5;
  }
  .auth-card {
    background: var(--card);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 48px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    text-align: center;
  }
  .auth-card h1 {
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, #ffd9b8 50%, var(--primary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .auth-card .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* Form Controls */
  .field {
    text-align: left;
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
  }
  .field input:focus {
    border-color: var(--secondary);
    background: rgba(255, 255, 255, 0.06);
    box-shadow: 0 0 12px rgba(0, 150, 255, 0.25);
  }

  .btn-submit {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    margin-top: 10px;
    transition: transform 0.2s ease, opacity 0.2s ease;
    box-shadow: 0 8px 20px -6px rgba(0, 150, 255, 0.4);
  }
  .btn-submit:hover {
    transform: translateY(-2px);
    opacity: 0.95;
  }
  .btn-submit:active {
    transform: translateY(0);
  }

  .auth-foot {
    margin-top: 24px;
    font-size: 14px;
    color: var(--muted);
  }
  .auth-foot a {
    color: var(--secondary);
    text-decoration: none;
    font-weight: 500;
  }
  .auth-foot a:hover {
    text-decoration: underline;
  }

  /* Messaging Status */
  .msg {
    display: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 20px;
    text-align: left;
  }
  .msg.error {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #F87171;
  }
  .msg.success {
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.25);
    color: #4ADE80;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--line);
    background: rgba(2, 6, 23, 0.3);
  }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="EduTech Logo">
    <span>EduTech</span>
  </a>
  <a href="index.html" class="nav-btn">Home</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="sub">Log in to manage your classes and learning roadmap</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email or Employee ID</label>
        <input type="text" id="email" placeholder="student@example.com / employee_id" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn-submit">Log in</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">
      Don't have an learning account? <a href="register.html">Sign up now</a>
    </div>
  </div>
</div>

<footer>
  © 2026 ElevateIQ EduTech Academy. All rights reserved.
</footer>

<script>
const API_BASE = window.location.origin;

// Redirect if session token exists
if (localStorage.getItem("edutech_token")) {
  const params = new URLSearchParams(window.location.search);
  const redir = params.get("redirect");
  if (redir) {
    window.location.href = redir;
  } else {
    window.location.href = "dashboard.html";
  }
}

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const payload = {
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    portal: "edutech"
  };

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message || 'Login successful.';
      successMsg.style.display = 'block';
      localStorage.setItem("edutech_token", data.token);
      localStorage.setItem("edutech_user", JSON.stringify(data.user));
      
      setTimeout(() => {
        const params = new URLSearchParams(window.location.search);
        const redir = params.get("redirect");
        if (redir) {
          window.location.href = redir;
        } else {
          window.location.href = 'dashboard.html';
        }
      }, 1000);
    } else {
      errorMsg.textContent = data.error || 'Invalid credentials.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach server. Verify connection.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
