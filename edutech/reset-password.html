<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — EduTech Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="shortcut icon" href="logo.png" type="image/png">
<style>
  :root {
    --primary: #ff7a00;
    --secondary: #0096ff;
    --accent: #ff8a00;
    --success: #22C55E;
    --bg: #020617;
    --bg-soft: #050b1f;
    --card: rgba(15, 23, 36, 0.7);
    --text: #F8FAFC;
    --muted: #94A3B8;
    --line: rgba(148, 163, 184, 0.12);
    --glass-border: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow-x: hidden; height: 100vh;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .bg-canvas {
    position: fixed; inset: 0; z-index: -1; overflow: hidden;
    background: radial-gradient(circle at 50% 50%, var(--bg-soft) 0%, var(--bg) 100%);
  }
  .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; }
  .orb1 { top: -10%; left: -10%; width: 45%; height: 45%; background: var(--primary); }
  .orb2 { bottom: -10%; right: -10%; width: 50%; height: 50%; background: var(--secondary); }
  nav {
    display: flex; justify-content: space-between; align-items: center; padding: 20px 40px;
    border-bottom: 1px solid var(--line); background: rgba(2, 6, 23, 0.5); backdrop-filter: blur(10px); z-index: 10;
  }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo img { height: 32px; width: auto; object-fit: contain; }
  .logo span { font-size: 14px; color: #fff; font-weight: 700; margin-left: 10px; }
  .nav-btn {
    text-decoration: none; color: var(--text); font-size: 14px; font-weight: 500;
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--line);
    transition: all 0.3s ease; background: rgba(255,255,255,0.02);
  }
  .nav-btn:hover { border-color: var(--secondary); background: rgba(0, 150, 255, 0.1); }
  .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; z-index: 5; }
  .auth-card {
    background: var(--card); border: 1px solid var(--glass-border); backdrop-filter: blur(20px);
    border-radius: 24px; padding: 48px; width: 100%; max-width: 440px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); text-align: center;
  }
  .auth-card h1 {
    font-size: 28px; margin-bottom: 8px; font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, #ffd9b8 50%, var(--primary) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .auth-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .field { text-align: left; margin-bottom: 20px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; }
  
  .password-wrapper { position: relative; width: 100%; }
  .password-wrapper input { padding-right: 46px !important; }
  .field input {
    width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.03); color: var(--text); font-size: 15px; outline: none; transition: all 0.3s;
  }
  .field input:focus { border-color: var(--secondary); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 12px rgba(0, 150, 255, 0.25); }
  
  .password-toggle {
    position: absolute; top: 50%; right: 14px; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--primary);
    display: flex; align-items: center; justify-content: center; padding: 4px; z-index: 10;
  }
  .btn-submit {
    width: 100%; padding: 14px; font-size: 15px; font-weight: 600; color: white;
    background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px;
    margin-top: 10px; border: none; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
  }
  .btn-submit:hover { transform: translateY(-2px); opacity: 0.95; }
  .auth-foot { margin-top: 24px; font-size: 14px; color: var(--muted); }
  .auth-foot a { color: var(--secondary); text-decoration: none; font-weight: 500; }
  .auth-foot a:hover { text-decoration: underline; }
  .msg { display: none; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 20px; text-align: left; }
  .msg.error { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); color: #F87171; }
  .msg.success { background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.25); color: #4ADE80; }
  footer { text-align: center; padding: 20px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--line); background: rgba(2, 6, 23, 0.3); }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<nav>
  <a href="/" class="logo">
    <img src="logo.png" alt="EduTech Logo">
    <span>EduTech</span>
  </a>
  <a href="login.html" class="nav-btn">Login</a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="sub">Set a new password for your EduTech learning account</p>

    <form id="resetForm">
      <div class="field">
        <label for="password">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required placeholder="Min 8 characters, 1 digit, 1 special">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>
      
      <div class="field">
        <label for="confirm_password">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" required placeholder="Re-enter password">
          <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm_password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Update Password</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg"></div>

    <div class="auth-foot">
      Back to <a href="login.html">Log in here</a>
    </div>
  </div>
</div>

<footer>
  © 2026 ElevateIQ EduTech Academy. All rights reserved.
</footer>

<script>
const API_BASE = window.location.origin;
const token = new URLSearchParams(window.location.search).get("token");

if (!token) {
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('errorMsg').textContent = 'Error: Invalid or missing reset token. Please check your email link.';
  document.getElementById('errorMsg').style.display = 'block';
}

document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm_password').value;

  if (password !== confirmPassword) {
    errorMsg.textContent = 'Passwords do not match.';
    errorMsg.style.display = 'block';
    return;
  }

  const submitBtn = document.querySelector('.btn-submit');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.innerHTML = 'Updating...';

  try {
    const res = await fetch(`${API_BASE}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();

    if (res.ok) {
      successMsg.textContent = data.message || 'Password updated successfully! Redirecting...';
      successMsg.style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } else {
      errorMsg.textContent = data.error || 'Failed to reset password.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach server. Verify connection.';
    errorMsg.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});

function togglePasswordVisibility(fieldId, btn) {
  const pwdInput = document.getElementById(fieldId);
  if (pwdInput.type === 'password') {
    pwdInput.type = 'text';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
  } else {
    pwdInput.type = 'password';
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
  }
}
</script>
</body>
</html>
