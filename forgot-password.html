<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Elevate IQ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Preloader Overlay -->
<div id="preloader" class="preloader-overlay">
  <video id="preloader-video" class="preloader-video" autoplay muted playsinline>
    <source src="logo_animated.mp4" type="video/mp4">
  </video>
</div>
<script src="preloader.js"></script>

<!-- Ambient Background Video -->
<video autoplay muted loop playsinline class="video-bg">
  <source src="logo_animated.mp4" type="video/mp4">
</video>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<nav>
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Elevate IQ Logo">
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="openings.html">Careers</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Portfolio</a></li>
    <li><a href="contact.html">Contact Us</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="btn-login">Login</a>
    <a href="register.html" class="btn-primary">Sign up</a>
  </div>
</nav>

<section class="auth-wrap">
  <div class="auth-card">
    <h1>Reset Password</h1>
    <p class="sub">Enter your email and we'll generate a secure reset link</p>

    <form id="forgotForm">
      <div class="field"><label for="email">Email address</label><input type="email" id="email" required></div>
      <button type="submit" class="btn-primary auth-submit">Generate Reset Link</button>
    </form>

    <div class="msg error" id="errorMsg"></div>
    <div class="msg success" id="successMsg" style="word-break: break-all;"></div>

    <div class="auth-foot">Remember your password? <a href="login.html">Log in</a></div>
  </div>
</section>

<footer>
  © 2026 ElevateIQ Soft Tech Private Limited. All rights reserved.
</footer>

<script>
const API_BASE = "http://localhost:5000";

document.getElementById('forgotForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  errorMsg.style.display = 'none';
  successMsg.style.display = 'none';

  const payload = {
    email: document.getElementById('email').value
  };

  try {
    const res = await fetch(`${API_BASE}/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (res.ok) {
      // Simulate email reset link delivery in testing
      successMsg.innerHTML = `
        <strong>Reset link generated:</strong><br>
        <a href="${data.reset_link}" style="color:#9bd6ff; text-decoration:underline;">Click here to reset your password</a>
      `;
      successMsg.style.display = 'block';
    } else {
      errorMsg.textContent = data.error || 'Email address not found.';
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = 'Could not reach the server. Make sure the backend is running.';
    errorMsg.style.display = 'block';
  }
});
</script>

</body>
</html>
